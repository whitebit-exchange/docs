  /api/v4/orders/conditional:
    post:
      summary: Query unexecuted(active) conditional orders
      operationId: getConditionalOrders
      description: |
        The endpoint returns active (unexecuted) conditional orders for the authenticated account. Conditional orders include [OCO](/glossary#one-cancels-the-other-oco) and [OTO](/glossary#one-triggers-the-other-oto) types. The response uses polymorphic structure — each record contains a `type` field (`oco` or `oto`) that determines the record shape. Use the optional `market` parameter to filter results.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: |
                    Filter by specific market. Example: BTC_USDT

                    If not specified, returns conditional orders for all markets.
                  example: "BTC_USDT"
                offset:
                  type: integer
                  description: "Number of records to skip for pagination."
                  default: 0
                  example: 0
                limit:
                  type: integer
                  description: "Maximum number of records to return per page."
                  default: 50
                  example: 100
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              market: BTC_USDT
              offset: 0
              limit: 100
      responses:
        '200':
          description: Successful response - returns paginated conditional orders (OCO and OTO types)
          content:
            application/json:
              schema:
                type: object
                properties:
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
                  total:
                    type: integer
                    description: Total number of records
                    example: 2
                  records:
                    type: array
                    description: Array of conditional orders (can be OCO or OTO type)
                    items:
                      oneOf:
                        - type: object
                          description: OCO type conditional order
                          properties:
                            id:
                              type: integer
                              example: 117703764513
                            type:
                              type: string
                              enum: [oco]
                              example: "oco"
                            stop_loss:
                              type: object
                              properties:
                                order_id:
                                  type: integer
                                  example: 117703764514
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
                            take_profit:
                              type: object
                              properties:
                                order_id:
                                  type: integer
                                  example: 117703764515
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
                        - type: object
                          description: OTO type conditional order
                          properties:
                            id:
                              type: integer
                              example: 29457221
                            type:
                              type: string
                              enum: [oto]
                              example: "oto"
                            stopLossPrice:
                              type: string
                              example: "30000"
                            takeProfitPrice:
                              type: string
                              example: "50000"
                            conditionalOrder:
                              type: object
                              properties:
                                order_id:
                                  type: integer
                                  example: 3686033640
                                client_order_id:
                                  type: string
                                  example: "customId11"
                                market:
                                  type: string
                                  example: "BTC_USDT"
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
              example:
                limit: 100
                offset: 0
                total: 2
                records:
                  - id: 117703764513
                    type: "oco"
                    stop_loss:
                      order_id: 117703764514
