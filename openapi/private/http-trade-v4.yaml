                  type: string
                  description: "Trading pair to filter by. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Omit to retrieve orders across all markets."
                  example: "BTC_USDT"
                offset:
                  type: integer
                  default: 0
                  minimum: 0
                  description: "Number of records to skip. Default: `0`."
                  example: 0
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 50
                  description: "Maximum number of records to return. Default: `50`. Minimum: `1`. Maximum: `500`."
                  example: 50
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns order history grouped by market. Empty response if order is not yours.
          content:
            application/json:
              schema:
                type: object
                description: Object with market names as keys, each containing an array of orders
                additionalProperties:
                  type: array
                  items:
                    type: object
                    properties:
                      amount:
                        type: string
                        description: "Order quantity in base currency for limit orders, or in quote currency for buy market orders."
                        example: "0.0009"
                      price:
                        type: string
                        description: "Limit price per unit in quote currency. Returns `\"0\"` for market orders."
                        example: "40000"
                      type:
                        type: string
                        description: "Order type. Possible values: `limit`, `market`, `stock market`, `stop limit`, `stop market`."
                        example: "limit"
                      id:
                        type: integer
                        description: "Unique order identifier assigned by the matching engine."
                        example: 4986126152
                      client_order_id:
                        type: string
                        description: "Custom client order identifier supplied in the request. Returns an empty string when not specified."
                        example: "customId11"
                      side:
                        type: string
                        description: "Order side. Possible values: `buy`, `sell`."
                        enum: [buy, sell]
                        example: "sell"
                      ctime:
                        type: number
                        description: "Unix timestamp in seconds (UTC) of order creation, with microsecond precision."
                        example: 1597486960.311311
                      takerFee:
                        type: string
                        description: "Taker fee ratio applied to the order. Values below `0.0001` are rounded to zero."
                        example: "0.001"
                      ftime:
                        type: number
                        description: "Unix timestamp when the order reached its final status
                          (FILLED or CANCELLED). For partially-filled orders that are subsequently
                          cancelled, the timestamp reflects the cancellation time, not the last fill time."
                        example: 1597486960.311332
                      makerFee:
                        type: string
                        description: "Maker fee ratio applied to the order. Values below `0.0001` are rounded to zero."
                        example: "0.001"
                      deal_fee:
                        type: string
                        description: "Cumulative trading fee charged for filled portions, denominated in the fee asset."
                        example: "0.041258268"
                      deal_stock:
                        type: string
                        description: "Filled amount in base (stock) currency."
                        example: "0.0009"
                      deal_money:
                        type: string
                        description: "Filled amount in quote (money) currency."
                        example: "41.258268"
                      postOnly:
                        type: boolean
                        description: "Post-only flag. When `true`, the order executed only as a maker order."
                        example: false
                      ioc:
                        type: boolean
                        description: "Immediate-or-cancel flag. When `true`, the order executed available quantity immediately and cancelled the rest."
                        example: false
                      status:
                        type: string
                        description: "Current order lifecycle status. Possible values: `FILLED`, `CANCELED`, `PARTIAL_CANCELED`."
                        example: "CANCELED"
                      feeAsset:
                        type: string
                        description: "Currency ticker of the asset used to pay the trading fee."
                        example: "USDT"
                      stp:
                        type: string
                        description: "Self-trade prevention mode. Possible values: `no`, `cancel_both`, `cancel_new`, `cancel_old`."
                        example: "no"
                      rpi:
                        type: boolean
                        description: "Retail Price Improvement flag. `true` when the order used RPI pricing."
                        example: false
              example:
                BTC_USDT:
                  - amount: "0.0009"
                    price: "40000"
                    type: "limit"
                    id: 4986126152
                    client_order_id: "customId11"
                    side: "sell"
                    ctime: 1597486960.311311
                    takerFee: "0.001"
                    ftime: 1597486960.311332
                    makerFee: "0.001"
                    deal_fee: "0.041258268"
                    deal_stock: "0.0009"
                    deal_money: "41.258268"
                    postOnly: false
                    ioc: false
                    status: "CANCELED"
                    feeAsset: "USDT"
                    stp: "no"
                    rpi: false
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/modify:
    post:
      summary: Modify order
      operationId: modifyOrder
      description: |
        The endpoint modifies existing [order](/glossary#orders).
        
        Supported order types: limit, stop limit, stop market.
        
        Request must contain one of the following parameters: amount, price, activationPrice.
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Note>
        - Use total parameter instead of amount for modify buy stop market order.
        - Modification by client_order_id takes priority.
        - The request supports working only with order_id or only with client_order_id.
        - Do not pass both values at the same time.
        </Note>

        <Note>
        **WebSocket impact:** Each call to the endpoint cancels the original order and
        creates a replacement with a **new `order_id`**. Clients subscribed to the
        `ordersPending_update` WebSocket channel will receive:
        - `event_id=3` (cancel) for the old order
        - `event_id=1` (new) for the replacement

        Update any `order_id` references after a successful modify response.
        Use `client_order_id` for stable order tracking across modifications.
        </Note>

        <Accordion title="Error Codes">
        **Status 400** (client errors): 1, 2, 6, 20, 24, 101, 158
        
        **Status 422** (business logic): 10, 11, 12, 13, 14, 15, 16, 17, 25, 27, 40, 42, 51, 103, 104, 105, 106, 111, 112, 113, 114, 115, 150, 151, 152, 153, 155, 157, 159, 160, 161, 162, 163, 250, 251, 300, 302, 330
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 2,
          "message": "Inner validation failed",
          "errors": {
            "order_id": ["Unexecuted order was not found."]
          }
        }
        ```
        
        ```json
        {
          "code": 10,
          "message": "Validation failed",
          "errors": {
            "amount": ["Not enough balance."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - request
                - nonce
              properties:
                order_id:
                  type: integer
                  description: "Active order id. Required if client_order_id is not set."
                  example: 4180284841
                client_order_id:
                  type: string
                  description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. Required if order_id is not set."
                  example: "order1987111"
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency to buy or sell. Example: '0.001' or 0.001"
                  example: "0.001"
                total:
                  type: string
                  description: "Total of [money](/glossary#money) currency to buy or sell. Example: '0.001' or 0.001"
                  example: "100"
                price:
                  type: string
                  description: "Price in [money](/glossary#money) currency. Example: '9800' or 9800"
                  example: "9800"
                activationPrice:
                  type: string
                  description: "Activation price in [money](/glossary#money) currency. Example: '10000' or 10000"
                  example: "10000"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: Order modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - client errors (invalid arguments, order not found, quote expired, activation price issues)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable entity - business logic validation failed (balance insufficient, trading restrictions, order type conflicts, price bands exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/kill-switch:
    post:
      summary: Sync kill-switch timer
      operationId: setKillSwitch
      description: |
        The endpoint creates, updates, or deletes a [kill-switch timer](/glossary#kill-switch-timer). The kill-switch acts as a safety mechanism for automated trading systems — the timer automatically cancels all open orders for the specified market if the client fails to reset the timer before expiration. Set `timeout` to a value between `5` and `600` (seconds) to create or update a timer. Set `timeout` to `null` to delete an existing timer.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>

        <Note>
        - If timeout=null - delete existing timer by market.
        - If types=null - create timer by market for all order types.
        </Note>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "market": ["Market field is required."],
            "timeout": ["Timeout field is required."]
          }
        }
        ```
        
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "timeout": ["Timeout should be at least 5."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - timeout
              properties:
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                timeout:
                  type: string
                  description: "Timer value. Example: '5'-'600' or null"
                  example: "60"
                types:
                  type: array
                  description: "Order types to target. Valid values: \"spot\" — standard spot
                    orders. \"margin\" — marginal orders placed on spot markets. Note: the
                    \"margin\" value is not the same as the collateral account balance;
                    \"collateral\" in other endpoints refers to the funding account, whereas
                    \"margin\" here refers specifically to the order type. \"futures\" —
                    marginal orders placed on futures markets (e.g., BTC_PERP). If omitted,
                    the API targets all order types."
                  example: ["spot", "margin"]
                  items:
                    type: string
                    enum: [spot, margin, futures]
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: Successful response - kill-switch timer synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  market:
                    type: string
                    description: "Trading pair the timer applies to."
                    example: "BTC_USDT"
                  startTime:
                    type: integer
                    description: "Unix timestamp (seconds) when the timer was created or last reset."
                    example: 1662478154
                  cancellationTime:
                    type: integer
                    description: "Unix timestamp (seconds) when the kill-switch will cancel orders. Equals `startTime + timeout`."
                    example: 1662478154
                  types:
                    type: array
                    description: "Order types targeted by the kill-switch. Possible values: `spot`, `margin`, `futures`."
                    items:
                      type: string
                      enum: [spot, margin, futures]
                    example: ["spot", "margin"]
              example:
                market: "BTC_USDT"
                startTime: 1662478154
                cancellationTime: 1662478154
                types: ["spot", "margin"]
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v4/order/kill-switch/status:
    post:
      summary: Status kill-switch timer
      operationId: getKillSwitchStatus
      description: |
        The endpoint retrieves the status of active [kill-switch timers](/glossary#kill-switch-timer). The response returns an array of timer objects for the specified market, or for all markets if the `market` parameter is omitted. Each timer object includes the start time, scheduled cancellation time, and targeted order types.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns array of kill-switch timer statuses
          content:
            application/json:
              schema:
                type: array
                description: Array of active kill-switch timers
                items:
                  type: object
                  properties:
                    market:
                      type: string
                      description: "Trading pair the timer applies to."
                      example: "BTC_USDT"
                    startTime:
                      type: integer
                      description: "Unix timestamp (seconds) when the timer was created or last reset."
                      example: 1686127243
                    cancellationTime:
                      type: integer
                      description: "Unix timestamp (seconds) when the kill-switch will cancel orders. Equals `startTime + timeout`."
                      example: 1686127343
                    types:
                      type: array
                      description: "Order types targeted by the kill-switch. Possible values: `spot`, `margin`, `futures`."
                      items:
                        type: string
                        enum: [spot, margin, futures]
                      example: ["spot", "margin"]
              example:
                - market: "BTC_USDT"
                  startTime: 1686127243
                  cancellationTime: 1686127343
                  types: ["spot", "margin"]
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-TXC-APIKEY
      description: The public WhiteBIT API key.
    PayloadAuth:
      type: apiKey
      in: header
      name: X-TXC-PAYLOAD
      description: Base64-encoded JSON request body.
    SignatureAuth:
      type: apiKey
      in: header
      name: X-TXC-SIGNATURE
      description: HMAC-SHA512 signature of the payload, hex-encoded. Computed as hex(HMAC-SHA512(payload, api_secret)).
  responses:
    BulkLimitOrderResponse:
      description: Orders created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BulkLimitOrderResponse'
  schemas:
    ExecutedDeal:
      type: object
      properties:
        id:
          type: integer
          description: "Unique deal identifier assigned by the matching engine."
        client_order_id:
          type: string
          description: "Custom order identifier supplied in the original order request. Returns an empty string when not specified."
        time:
          type: number
          description: "Unix timestamp of the deal execution, with microsecond precision."
        side:
          type: string
          enum: [buy, sell]
          description: "Order side that produced the deal. Possible values: `buy`, `sell`."
        role:
          type: integer
          description: "Execution role in the deal. `1` = maker (order was resting on the book), `2` = taker (order matched immediately)."
        amount:
          type: string
          description: "Executed quantity in base (stock) currency, regardless of order direction."
        price:
          type: string
          description: "Execution price per unit in quote currency."
        deal:
          type: string
          description: "Total deal value in quote (money) currency. Equals `amount * price`."
        fee:
          type: string
          description: "Fee charged for the deal, denominated in the asset specified by `feeAsset`."
        order_id:
          type: integer
          description: "Identifier of the parent order that produced the deal."
        feeAsset:
          type: string
          description: "Currency ticker of the asset used to pay the trading fee."

    LimitOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Trading pair. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Query `GET /api/v4/public/markets` for available markets."
          example: BTC_USDT
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "Order quantity in base (stock) currency. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount`, `minTotal`, `maxTotal`. Precision: `stockPrec`."
          example: "0.001"
        price:
          type: string
          description: "Limit price per unit in quote (money) currency. Minimum and maximum values are market-dependent. Precision: `moneyPrec`."
          example: "9800"
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: "order1987111"
        postOnly:
          type: boolean
          default: false
          description: "Post-only flag. When `true`, the order executes only as a [maker](/glossary#maker) order and the system rejects the order if it would match immediately. Default: `false`."
          example: false
        ioc:
          type: boolean
          default: false
          description: |
            Immediate-or-cancel (IOC) flag. When `true`, the matching engine executes all or part of the order immediately and cancels any unfilled portion. Default: `false`.

            IOC does not support `rpi=true` because RPI uses post-only behavior by design.
            The API returns error code `37` when a request sets both `ioc=true` and `rpi=true`.

            Refer to [Order Parameter Rules](/guides/order-parameter-rules) for unsupported parameter combinations.
          example: false
        bboRole:
          type: integer
          enum: [1, 2]
          description: "Best Bid/Offer ([BBO](/glossary#bbo)) execution method. The system selects the best market price for execution. `1` = Queue method, `2` = Counterparty method. Use method `2` with the `ioc` flag."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self-trade prevention mode. Allowed values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        rpi:
          type: boolean
          default: false
          description: |
            Enables Retail Price Improvement (RPI) mode. Default: `false`.

            RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
            The API returns error code `37` when a request sets both `rpi=true` and `ioc=true`.
            RPI orders do not appear in public order book feeds (`depth`, `bookTicker`). RPI orders are visible only in private active orders and in the exchange UI order book (web/mobile).
            RPI executions may apply custom fees or rebates, especially when trading via sub-accounts. Use Query Market Fee / Query All Market Fees to verify effective fees.

            Refer to [Order Parameter Rules](/guides/order-parameter-rules) for unsupported parameter combinations.
          example: true
        request:
          type: string
          example: "{{request}}"
        nonce:
          type: string
          example: "{{nonce}}"

    MarketOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Trading pair. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Query `GET /api/v4/public/markets` for available markets."
          example: "BTC_USDT"
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "For buy orders: total in quote (money) currency to spend. For sell orders: quantity in base (stock) currency to sell. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount`, `minTotal`, `maxTotal`."
          example: "100"
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: "order1987111"
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self-trade prevention mode. Allowed values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        request:
          type: string
          example: "{{request}}"
        nonce:
          type: string
          example: "{{nonce}}"

    StopLimitOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - price
        - activation_price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Trading pair. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Query `GET /api/v4/public/markets` for available markets."
          example: "BTC_USDT"
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "Order quantity in base (stock) currency. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount`, `minTotal`, `maxTotal`. Precision: `stockPrec`."
          example: "0.001"
        price:
          type: string
          description: "Limit price per unit in quote (money) currency applied after the stop triggers. Minimum and maximum values are market-dependent. Precision: `moneyPrec`."
          example: "9800"
        activation_price:
          type: string
          description: "Trigger price in quote (money) currency. For buy orders, the stop triggers when the market price rises to or above the specified price. For sell orders, the stop triggers when the market price falls to or below the specified price. Precision: `moneyPrec`."
          example: "10000"
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: "order1987111"
        bboRole:
          type: integer
          enum: [1, 2]
          description: "Best Bid/Offer ([BBO](/glossary#bbo)) execution method. The system selects the best market price for execution after the stop triggers. `1` = Queue method, `2` = Counterparty method."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self-trade prevention mode. Allowed values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        request:
          type: string
          example: "{{request}}"
        nonce:
          type: string
          example: "{{nonce}}"

    StockMarketOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Trading pair. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Query `GET /api/v4/public/markets` for available markets."
          example: "BTC_USDT"
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "Order quantity in base (stock) currency for both buy and sell sides. To place a market order specifying the quote (money) currency amount instead, use `POST /api/v4/order/market`. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount`, `minTotal`, `maxTotal`."
          example: "0.001"
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: "order1987111"
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self-trade prevention mode. Allowed values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        request:
          type: string
          example: "{{request}}"
        nonce:
          type: string
          example: "{{nonce}}"

    StopMarketOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - activation_price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Trading pair. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Query `GET /api/v4/public/markets` for available markets."
          example: "BTC_USDT"
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "For buy orders: total in quote (money) currency to spend. For sell orders: quantity in base (stock) currency to sell. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount`, `minTotal`, `maxTotal`."
          example: "0.01"
        activation_price:
          type: string
          description: "Trigger price in quote (money) currency. For buy orders, the stop triggers when the market price rises to or above the specified price. For sell orders, the stop triggers when the market price falls to or below the specified price. Precision: `moneyPrec`."
          example: "10000"
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: "order1987111"
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self-trade prevention mode. Allowed values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        request:
          type: string
          example: "{{request}}"
        nonce:
          type: string
          example: "{{nonce}}"

    BulkOrderItem:
      type: object
      properties:
        side:
          type: string
          enum: [buy, sell]
          description: "Order side. Allowed values: `buy`, `sell`."
          example: "buy"
        amount:
          type: string
          description: "Order quantity in base (stock) currency. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for `minAmount` and precision (`stockPrec`)."
          example: "0.001"
        price:
          type: string
          description: "Limit price per unit in quote (money) currency. Minimum and maximum values are market-dependent. Query `GET /api/v4/public/markets` for precision (`moneyPrec`)."
          example: "40000"
        market:
          type: string
          description: "Trading pair for the order. Format: `BASE_QUOTE` (e.g., `BTC_USDT`)."
          example: "BTC_USDT"
        postOnly:
          type: boolean
          default: false
          description: "Post-only flag. When `true`, the order executes only as a maker order and is rejected if it would match immediately. Default: `false`."
          example: false
        ioc:
          type: boolean
          default: false
          description: |
            Immediate-or-cancel (IOC) executes all or part of an order immediately and cancels any unfilled portion. Default: `false`.

            IOC does not support `rpi=true` because RPI uses post-only behavior by design.
            The API returns error code `37` when an order item sets both `ioc=true` and `rpi=true`.
          example: false
        client_order_id:
          type: string
          description: "Custom client order identifier. The identifier must be unique per account and contain only letters, numbers, dashes, dots, or underscores."
          example: ""
        rpi:
          type: boolean
          default: false
          description: |
            Enables Retail Price Improvement (RPI) mode. Default: `false`.

            RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
            The API returns error code `37` when an order item sets both `rpi=true` and `ioc=true`.
          example: true

    OrderResponse:
      type: object
      properties:
        order_id:
          type: integer
          description: "Unique identifier assigned to the order by the matching engine."
          example: 4180284841
        client_order_id:
          type: string
          description: "Custom client order identifier supplied in the request. Returns an empty string when not specified."
          example: "order1987111"
        market:
          type: string
          description: "Trading pair for the order. Format: `BASE_QUOTE` (e.g., `BTC_USDT`)."
          example: "BTC_USDT"
        side:
          type: string
          description: "Order side. Possible values: `buy`, `sell`."
          example: "buy"
        type:
          type: string
          description: "Order type. Possible values: `limit`, `market`, `stock market`, `stop limit`, `stop market`."
          example: "limit"
        timestamp:
          type: number
          description: "Unix timestamp in seconds (UTC) of order creation, with microsecond precision."
          example: 1595792396.165973
        deal_money:
          type: string
          description: "Filled amount in quote currency. Returns `\"0\"` while the order remains unfilled."
          example: "0"
        deal_stock:
          type: string
          description: "Filled amount in base currency. Returns `\"0\"` while the order remains unfilled."
          example: "0"
        amount:
          type: string
          description: "Order quantity in base currency for limit and stop-limit orders, or in quote currency for buy market orders."
          example: "0.01"
        left:
          type: string
          description: "Remaining unfilled quantity. Equals `amount` for new orders and `\"0\"` for fully filled orders."
          example: "0.001"
        deal_fee:
          type: string
          description: "Cumulative trading fee charged for filled portions, denominated in the fee asset."
          example: "0"
        price:
          type: string
          description: "Limit price per unit in quote currency. Returns `\"0\"` for market orders."
          example: "40000"
        postOnly:
          type: boolean
          description: "Post-only flag. When `true`, the order executes only as a maker order and is rejected if it would match immediately. Default: `false`."
          example: false
        ioc:
          type: boolean
          description: "Immediate-or-cancel flag. When `true`, the order executes available quantity immediately and cancels the unfilled remainder. Default: `false`."
          example: false
        status:
          type: string
          description: "Current order lifecycle status. Possible values: `NEW`, `FILLED`, `CANCELED`, `PARTIAL_FILLED`, `PARTIAL_CANCELED`."
          example: "FILLED"
        stp:
          type: string
          description: "Self-trade prevention mode. Possible values: `no`, `cancel_both`, `cancel_new`, `cancel_old`. Default: `no`."
          example: "no"
        positionSide:
          type: string
          description: "Position side (for collateral orders)"
          example: "LONG"
        rpi:
          type: boolean
          description: "Indicates Retail Price Improvement (RPI) mode for the order."
          example: true
        activated:
          type: integer
          description: "Activation status of the stop order. 0 = not yet triggered
            (waiting for the activation_price condition to be met). 1 = triggered
            (the stop condition has been met and the order is now active)."
          example: 0
        activationCondition:
          type: string
          enum: [lte, gte]
          description: "Condition that triggers the stop order. \"lte\" = activate
            when the market price falls to or below activation_price. \"gte\" =
            activate when the market price rises to or above activation_price."
          example: "lte"
        activation_price:
          type: string
          description: "The trigger price for the stop order. Always equals the
            activation_price value submitted in the request."
          example: "40000"
    BulkLimitOrderResponse:
      type: array
      items:
        type: object
        properties:
          result:
            type: object
            allOf:
              - $ref: '#/components/schemas/OrderResponse'
            nullable: true
          error:
            type: object
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
            nullable: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: "Error code"
          example: 30
        message:
          type: string
          description: "Error message"
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: "Detailed error information"
tags:
  - name: Collateral Trading
    description: Endpoints for collateral/margin trading operations
  - name: Spot Trading
    description: Endpoints for spot trading operations
  - name: Market Fee
    description: Endpoints for querying trading fees
