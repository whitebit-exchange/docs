  /api/v4/collateral-account/funding-history:
    post:
      summary: Funding History
      operationId: getFundingHistory
      description: |
        The endpoint returns the funding rate payment history for [collateral](/glossary#balance-collateral) positions. Each record includes the funding rate, settlement price, position amount, and the resulting funding payment. Use the optional `market` parameter to filter results to a single trading pair. The response supports pagination via `limit` and `offset` parameters.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>

        <Note>
        This endpoint supports pagination. Use `limit` (default: 100) and `offset` (default: 0) to page through results.
        </Note>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: |
                    Filter by specific market. For example: BTC_PERP

                    If not specified, returns funding history for all markets.
                  example: BTC_PERP
                limit:
                  type: integer
                  description: Number of records to return
                  example: 100
                  default: 100
                offset:
                  type: integer
                  description: Number of records to skip
                  example: 0
                  default: 0
                request:
                  type: string
                  description: Request signature
                  example: "{{request}}"
                nonce:
                  type: string
                  description: Unique request identifier
                  example: "{{nonce}}"
            example:
              market: "BTC_PERP"
              limit: 100
              offset: 0
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns paginated funding history
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    description: Array of funding history entries
                    items:
                      type: object
                      properties:
                        market:
                          type: string
                          description: Market name
                          example: "BTC_PERP"
                        fundingTime:
                          type: string
                          description: Funding time in Unix timestamp format
                          example: "1734451200"
                        fundingRate:
                          type: string
                          description: Funding rate applied
                          example: "0.00017674"
                        fundingAmount:
                          type: string
                          description: Funding amount paid or received
                          example: "-0.171053531892"
                        positionAmount:
                          type: string
                          description: Position amount at funding time
                          example: "0.019"
                        settlementPrice:
                          type: string
                          description: Settlement price used for funding calculation
                          example: "50938.2"
                        rateCalculatedTime:
                          type: string
                          description: Time when the funding rate was calculated in Unix timestamp format
                          example: "1734364800"
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
              example:
                records:
                  - market: "BTC_PERP"
                    fundingTime: "1734451200"
                    fundingRate: "0.00017674"
                    fundingAmount: "-0.171053531892"
                    positionAmount: "0.019"
                    settlementPrice: "50938.2"
                    rateCalculatedTime: "1734364800"
                  - market: "BTC_PERP"
                    fundingTime: "1734451200"
                    fundingRate: "-0.000177877800093587"
                    fundingAmount: "-0.0054997859133136"
                    positionAmount: "-0.001"
                    settlementPrice: "30918.9"
                    rateCalculatedTime: "1734364800"
                limit: 100
                offset: 0
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/leverage:
    post:
      summary: Change Collateral Account Leverage
      operationId: changeCollateralAccountLeverage
      description: |
        The endpoint changes the leverage level for the [collateral](/glossary#balance-collateral) trading account. Leverage determines the ratio of borrowed funds to collateral and directly affects margin requirements and liquidation thresholds. The accepted range is `1` to `100`.

        <Warning>
        Rate limit: 1000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - leverage
                - request
                - nonce
              properties:
                leverage:
                  type: integer
                  minimum: 1
                  maximum: 100
                  description: "Target leverage level. Accepted values range from `1` (no leverage) to `100` (maximum leverage)."
                  example: 5
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              leverage: 5
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - leverage changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  leverage:
                    type: integer
                    description: "Active leverage level for the collateral account after the update, from `1` (no leverage) to `100`"
                    example: 5
              example:
                leverage: 5
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/hedge-mode:
    post:
      summary: Collateral Account Hedge Mode
      operationId: getCollateralHedgeMode
      description: |
        The endpoint returns the current [hedge mode](/glossary#hedge-mode) status for the collateral trading account. When hedge mode is enabled (`true`), the account supports simultaneous long and short positions on the same market. When disabled (`false`), the account operates in one-way mode.
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns hedge mode status
          content:
            application/json:
              schema:
                type: object
                properties:
                  hedgeMode:
                    type: boolean
                    description: "Indicates whether hedge mode is active. When `true`, the account supports simultaneous long and short positions on the same market."
                    example: true
              example:
                hedgeMode: true
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
        '503':
          description: Service temporarily unavailable

