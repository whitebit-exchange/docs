      description: |
        The endpoint retrieves executed order history for all trading types — spot, margin, and futures — across all markets. Can be filtered by a single market if needed.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>

        <Warning>
        Requests with `limit` values above 100 return large payloads. Use high limits only when necessary and ensure the client application can handle large response sizes.
        </Warning>

        <Note>
        The endpoint can retrieve data not older than 6 months from the current month. For older data, use the Report on the History page.
        </Note>

        <Note>
        This endpoint supports pagination. Use `limit` (default: 50, max: 500) and `offset` (default: 0) to page through results.
        </Note>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "limit": ["Limit field should be an integer."],
            "offset": ["Offset field should be an integer."]
          }
        }
        ```
        
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market field format is invalid."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: "Requested [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                client_order_id:
                  type: string
                  description: "Filter by custom order identifier"
                  example: "customId11"
                startDate:
                  type: integer
                  description: "Start date in Unix-time format"
                  example: 1593233939
                endDate:
                  type: integer
                  description: "End date in Unix-time format"
                  example: 1593233939
                offset:
                  type: integer
                  default: 0
                  description: "Starting line index (OFFSET). Default: 0, Min: 0"
                  example: 0
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 50
                  description: "LIMIT is a special clause used to limit records a particular query can return. Default: 50, Min: 1, Max: 500"
                  example: 50
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
