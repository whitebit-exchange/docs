                        example: "0.001"
                      dealFee:
                        type: string
                        description: Paid fee when order is finished
                        example: "0.041258268"
                      dealStock:
                        type: string
                        description: Amount in stock currency that finished
                        example: "0.0009"
                      dealMoney:
                        type: string
                        description: Amount in money currency that finished
                        example: "41.258268"
                      postOnly:
                        type: boolean
                        description: Post-only flag
                        example: false
                      ioc:
                        type: boolean
                        description: Immediate or cancel flag
                        example: false
                      status:
                        type: string
                        description: Order status
                        example: "CANCELED"
                      feeAsset:
                        type: string
                        description: Fee asset
                        example: "USDT"
                      stp:
                        type: string
                        description: Self trade prevention mode
                        example: "no"
                      rpi:
                        type: boolean
                        description: Retail Price Improvement flag
                        example: false
              example:
                BTC_USDT:
                  - amount: "0.0009"
                    price: "40000"
                    type: "limit"
                    id: 4986126152
                    clientOrderId: "customId11"
                    side: "sell"
                    ctime: 1597486960.311311
                    takerFee: "0.001"
                    ftime: 1597486960.311332
                    makerFee: "0.001"
                    dealFee: "0.041258268"
                    dealStock: "0.0009"
                    dealMoney: "41.258268"
                    postOnly: false
                    ioc: false
                    status: "CANCELED"
                    feeAsset: "USDT"
                    stp: "no"
                    rpi: false
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/modify:
    post:
      summary: Modify order
      description: |
        The endpoint modifies existing [order](/glossary#orders).
        
        Supported order types: limit, stop limit, stop market.
        
        Request must contain one of the following parameters: amount, price, activationPrice.
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Note>
        - Use total parameter instead of amount for modify buy stop market order.
        - Modification by clientOrderId takes priority.
        - The request supports working only with orderId or only with clientOrderId.
        - Do not pass both values at the same time.
        </Note>
        
        <Accordion title="Error Codes">
        **Status 400** (client errors): 1, 2, 6, 20, 24, 101, 158
        
        **Status 422** (business logic): 10, 11, 12, 13, 14, 15, 16, 17, 25, 27, 40, 42, 51, 103, 104, 105, 106, 111, 112, 113, 114, 115, 150, 151, 152, 153, 155, 157, 159, 160, 161, 162, 163, 250, 251, 300, 302, 330
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 2,
          "message": "Inner validation failed",
          "errors": {
            "orderId": ["Unexecuted order was not found."]
          }
        }
        ```
        
        ```json
        {
          "code": 10,
          "message": "Validation failed",
          "errors": {
            "amount": ["Not enough balance."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - request
                - nonce
              properties:
                orderId:
                  type: integer
                  description: "Active order id. Required if clientOrderId is not set."
                clientOrderId:
                  type: string
                  description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. Required if orderId is not set."
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency to buy or sell. Example: '0.001' or 0.001"
                total:
                  type: string
                  description: "Total of [money](/glossary#money) currency to buy or sell. Example: '0.001' or 0.001"
                price:
                  type: string
                  description: "Price in [money](/glossary#money) currency. Example: '9800' or 9800"
                activationPrice:
                  type: string
                  description: "Activation price in [money](/glossary#money) currency. Example: '10000' or 10000"
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Order modified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - client errors (invalid arguments, order not found, quote expired, activation price issues)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable entity - business logic validation failed (balance insufficient, trading restrictions, order type conflicts, price bands exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/kill-switch:
    post:
      summary: Sync kill-switch timer
      description: |
        The endpoint creates, updates, deletes [kill-switch timer](/glossary#kill-switch-timer).
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Note>
        - If timeout=null - delete existing timer by market.
        - If types=null - create timer by market for all order types.
        </Note>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "market": ["Market field is required."],
            "timeout": ["Timeout field is required."]
          }
        }
        ```
        
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "timeout": ["Timeout should be at least 5."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - timeout
              properties:
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                timeout:
                  type: string
                  description: "Timer value. Example: '5'-'600' or null"
                types:
                  type: array
                  description: "Order types value. Example: 'spot', 'margin', 'futures' or null"
                  items:
                    type: string
                    enum: [spot, margin, futures]
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - kill-switch timer synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  market:
                    type: string
                    description: Market name
                    example: "BTC_USDT"
                  startTime:
                    type: integer
                    description: Timer start timestamp
                    example: 1662478154
                  cancellationTime:
                    type: integer
                    description: Order cancellation timestamp (startTime + timeout)
                    example: 1662478154
                  types:
                    type: array
                    description: Order types affected by kill-switch
                    items:
                      type: string
                      enum: [spot, margin, futures]
                    example: ["spot", "margin"]
              example:
                market: "BTC_USDT"
                startTime: 1662478154
                cancellationTime: 1662478154
                types: ["spot", "margin"]
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v4/order/kill-switch/status:
    post:
      summary: Status kill-switch timer
      description: |
        The endpoint retrieves the status of [kill-switch timer](/glossary#kill-switch-timer).
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - returns array of kill-switch timer statuses
          content:
            application/json:
              schema:
                type: array
                description: Array of active kill-switch timers
                items:
                  type: object
                  properties:
                    market:
                      type: string
                      description: Market name
                      example: "BTC_USDT"
                    startTime:
                      type: integer
                      description: Timer start timestamp
                      example: 1686127243
                    cancellationTime:
                      type: integer
                      description: Order cancellation timestamp (startTime + timeout)
                      example: 1686127343
                    types:
                      type: array
                      description: Order types affected by kill-switch
                      items:
                        type: string
                        enum: [spot, margin, futures]
                      example: ["spot", "margin"]
              example:
                - market: "BTC_USDT"
                  startTime: 1686127243
                  cancellationTime: 1686127343
                  types: ["spot", "margin"]
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-TXC-APIKEY
      description: |
        API Key authentication for private endpoints.
        
        Required headers:
        - X-TXC-APIKEY: API key
        - X-TXC-PAYLOAD: Base64 encoded JSON payload
        - X-TXC-SIGNATURE: HMAC SHA512 signature
  responses:
    BulkLimitOrderResponse:
      $ref: '#/components/schemas/BulkLimitOrderResponse'
  schemas:
    LimitOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Available [market](/glossary#market). Example: BTC_USDT"
          example: BTC_USDT
        side:
          type: string
          enum: [buy, sell]
          description: "Order type. Variables: 'buy' / 'sell' Example: 'buy'"
        amount:
          type: string
          description: "Amount of [stock](/glossary#stock) currency to buy or sell. Example: '0.001' or 0.001"
          example: "0.001"
        price:
          type: string
          description: "Price in money currency. Example: '9800' or 9800"
          example: "9800"
        clientOrderId:
          type: string
          description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. The identifier must be unique."
        postOnly:
          type: boolean
          default: false
          description: "[Orders](/glossary#orders) are guaranteed to be the [maker](/glossary#maker) order when [executed](/glossary#finished-orders). Variables: 'true' / 'false' Example: 'false'."
        ioc:
          type: boolean
          default: false
          description: |
            Immediate-or-cancel (IOC) executes all or part of an order immediately and cancels any unfilled portion.

            IOC does not support `rpi=true` because RPI uses post-only behavior by design.
            The API returns error code `37` when a request sets both `ioc=true` and `rpi=true`.

            Refer to [Order Parameter Rules](/guides/order-parameter-rules) for unsupported parameter combinations.
        bboRole:
          type: integer
          enum: [1, 2]
          description: "When the [BBO](/glossary#bbo) option is activated for Limit orders, the system selects the best market prices for execution. Variables: 1 - Queue Method / 2 - Counterparty Method. Use method 2 with ioc flag. Example: 2."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          default: no
          description: "Self trade prevention mode. Variables: 'no' / 'cancel_both' / 'cancel_new' / 'cancel_old'. Example: 'no'."
        rpi:
          type: boolean
          description: |
            Enables Retail Price Improvement (RPI) mode.

            RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
            The API returns error code `37` when a request sets both `rpi=true` and `ioc=true`.
            RPI orders do not appear in public order book feeds (`depth`, `bookTicker`). RPI orders are visible only in private active orders and in the exchange UI order book (web/mobile).
            RPI executions may apply custom fees or rebates, especially when trading via sub-accounts. Use Query Market Fee / Query All Market Fees to verify effective fees.

            Refer to [Order Parameter Rules](/guides/order-parameter-rules) for unsupported parameter combinations.
          example: true
        request:
          type: string
        nonce:
          type: string

    MarketOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Available [market](/glossary#market). Example: BTC_USDT"
          example: BTC_USDT
        side:
          type: string
          enum: [buy, sell]
          description: "Order type. Variables: 'buy' / 'sell' Example: 'buy'"
        amount:
          type: string
          description: "Amount of [money](/glossary#money) currency to buy or amount in [stock](/glossary#stock) currency to sell. Example: '5 USDT' for buy (min total) and '0.001 BTC' for sell (min amount)."
        clientOrderId:
          type: string
          description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. The identifier must be unique."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          description: "Self trade prevention mode. Variables: 'no' / 'cancel_both' / 'cancel_new' / 'cancel_old'. Example: 'no'."
        request:
          type: string
        nonce:
          type: string

    StopLimitOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - price
        - activation_price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Available [market](/glossary#market). Example: BTC_USDT"
          example: BTC_USDT
        side:
          type: string
          enum: [buy, sell]
          description: "Order type. Variables: 'buy' / 'sell' Example: 'buy'"
        amount:
          type: string
          description: "Amount of [stock](/glossary#stock) currency to buy or sell. Example: '0.001' or 0.001"
        price:
          type: string
          description: "Price in [money](/glossary#money) currency. Example: '9800' or 9800"
        activation_price:
          type: string
          description: "Activation price in [money](/glossary#money) currency. Example: '10000' or 10000"
        clientOrderId:
          type: string
          description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. The identifier must be unique."
        bboRole:
          type: integer
          enum: [1, 2]
          description: "When the [BBO](/glossary#bbo) option is activated for Limit orders, the system selects the best market prices for execution. Variables: 1 - Queue Method / 2 - Counterparty Method."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          description: "Self trade prevention mode. Variables: 'no' / 'cancel_both' / 'cancel_new' / 'cancel_old'. Example: 'no'."
          example: "no"
        request:
          type: string
        nonce:
          type: string

    StopMarketOrderRequest:
      type: object
      required:
        - market
        - side
        - amount
        - activation_price
        - request
        - nonce
      properties:
        market:
          type: string
          description: "Available [market](/glossary#market). Example: BTC_USDT"
          example: BTC_USDT
        side:
          type: string
          enum: [buy, sell]
          description: "Order type. Variables: 'buy' / 'sell' Example: 'buy'"
        amount:
          type: string
          description: "Amount of [money](/glossary#money) currency to buy or amount in [stock](/glossary#stock) currency to sell. Example: '0.01' or 0.01 for buy and '0.0001' for sell."
        activation_price:
          type: string
          description: "Activation price in [money](/glossary#money) currency. Example: '10000' or 10000"
        clientOrderId:
          type: string
          description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores. The identifier must be unique."
        stp:
          type: string
          enum: [no, cancel_both, cancel_new, cancel_old]
          description: "Self trade prevention mode. Variables: 'no' / 'cancel_both' / 'cancel_new' / 'cancel_old'. Example: 'no'."
          example: "no"
        request:
          type: string
        nonce:
          type: string

    BulkOrderItem:
      type: object
      properties:
        side:
          type: string
          enum: [buy, sell]
        amount:
          type: string
        price:
          type: string
        market:
          type: string
        postOnly:
          type: boolean
        ioc:
          type: boolean
          description: |
            Immediate-or-cancel (IOC) executes all or part of an order immediately and cancels any unfilled portion.

            IOC does not support `rpi=true` because RPI uses post-only behavior by design.
            The API returns error code `37` when an order item sets both `ioc=true` and `rpi=true`.
        clientOrderId:
          type: string
        rpi:
          type: boolean
          description: |
            Enables Retail Price Improvement (RPI) mode.

            RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
            The API returns error code `37` when an order item sets both `rpi=true` and `ioc=true`.
          example: true

    OrderResponse:
      type: object
      properties:
        orderId:
          type: integer
          description: "Order ID"
        clientOrderId:
          type: string
          description: "Custom client order ID; empty string if not specified"
        market:
          type: string
          description: "Deal market"
        side:
          type: string
          description: "Order side"
        type:
          type: string
          description: "Order type"
        timestamp:
          type: number
          description: "Timestamp of order creation"
        dealMoney:
          type: string
          description: "If order finished - amount in money currency that is finished"
        dealStock:
          type: string
          description: "If order finished - amount in stock currency that is finished"
        amount:
          type: string
          description: "Amount"
        left:
          type: string
          description: "If order not finished - rest of the amount that must be finished"
        dealFee:
          type: string
          description: "Fee in money currency when order is filled"
        price:
          type: string
          description: "Price"
        postOnly:
          type: boolean
          description: "PostOnly flag"
        ioc:
          type: boolean
          description: "IOC flag"
        status:
          type: string
          description: "Order status"
        stp:
          type: string
          description: "Self trade prevention mode"
        positionSide:
          type: string
          description: "Position side (for collateral orders)"
        rpi:
          type: boolean
          description: "Indicates Retail Price Improvement (RPI) mode for the order."
          example: true
    BulkLimitOrderResponse:
      type: array
      description: Orders created
      items:
        type: object
        properties:
          result:
            $ref: '#/components/schemas/OrderResponse'
          error:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
            nullable: true
      example:
        - result:
            orderId: 4326248250
            clientOrderId: ""
            market: "BTC_USDT"
            side: "buy"
            type: "limit"
            timestamp: 1684916268.825564
            dealMoney: "641.988"
            dealStock: "0.02"
            amount: "0.02"
            left: "0"
            dealFee: "1.283976"
            ioc: false
            postOnly: false
            price: "40000"
            status: "FILLED"
            stp: "no"
            positionSide: "BOTH"
            rpi: true
          error: null
        - result: null
          error:
            code: 32
            message: "Validation failed"
            errors:
              amount: ["Given amount is less than min amount 0.001."]
        - result:
            orderId: 4326248250
            clientOrderId: ""
            market: "BTC_USDT"
            side: "sell"
            type: "limit"
            timestamp: 1684916268.825564
            dealMoney: "641.988"
            dealStock: "0.02"
            amount: "0.02"
            left: "0"
            dealFee: "1.283976"
            ioc: false
            postOnly: false
            price: "41000"
            status: "FILLED"
            stp: "no"
            positionSide: "BOTH"
            rpi: true
          error: null
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: "Error code"
        message:
          type: string
          description: "Error message"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: "Detailed error information"
tags:
  - name: Collateral Trading
    description: Endpoints for collateral/margin trading operations
  - name: Spot Trading
    description: Endpoints for spot trading operations