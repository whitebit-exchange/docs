  /api/v4/collateral-account/positions/open:
    post:
      summary: Open Positions
      operationId: getOpenPositions
      description: |
        The endpoint returns all open [collateral](/glossary#balance-collateral) positions for the authenticated account. Each position includes entry price, unrealized PnL, margin allocation, liquidation price, and take-profit/stop-loss configuration. Use the optional `market` parameter to filter results to a single trading pair.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: |
                    Filter by specific market. For example: BTC_USDT

                    If not specified, returns all open positions.
                  example: BTC_USDT
                request:
                  type: string
                  description: Request signature
                  example: "{{request}}"
                nonce:
                  type: string
                  description: Unique request identifier
                  example: "{{nonce}}"
            example:
              market: "BTC_USDT"
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns array of open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    positionId:
                      type: integer
                      description: Unique position identifier
                      example: 527
                    market:
                      type: string
                      description: Market name
                      example: "BTC_USDT"
                    amount:
                      type: string
                      description: Position amount
                      example: "0.1"
                    basePrice:
                      type: string
                      description: Base price of position
                      example: "45658.349"
                    pnl:
                      type: string
                      description: "Realized profit and loss accumulated from partial position
                        closes, in money currency. Zero for newly opened positions that have not
                        been partially closed."
                      example: "-168.42"
                    pnlPercent:
                      type: string
                      description: Unrealized profit and loss in percentage
                      example: "-0.43"
                    margin:
                      type: string
                      description: Amount of funds in open position money
                      example: "8316.74"
                    freeMargin:
                      type: string
                      description: Free funds for trading
                      example: "619385.67"
                    funding:
                      type: string
                      description: "Cumulative funding fees paid over the entire lifetime of
                        the position, in money currency. For futures markets (e.g., BTC_PERP
                        and other _PERP pairs), the value is always \"0\" — futures funding is
                        applied via periodic balance updates rather than being tracked per position."
                      example: "0"
                    unrealizedPnl:
                      type: string
                      description: "Floating (mark-to-market) unrealized profit and loss in
                        money currency. Updates continuously as the market price changes."
                      example: "0.0019142920201966"
                    positionSide:
                      type: string
                      description: Position side
                      enum: [LONG, SHORT, BOTH]
                      example: "LONG"
                    openDate:
                      type: number
                      description: Date of position opening in Unix timestamp format
                      example: 1651568067.789679
                    modifyDate:
                      type: number
                      description: Date of position modifying (current event) in Unix timestamp format
                      example: 1651568067.789679
                    liquidationPrice:
                      type: string
                      description: Liquidation price according to current state of position
                      nullable: true
                      example: null
                    liquidationState:
                      type: string
                      description: State of liquidation
                      enum: [margin_call, liquidation]
                      nullable: true
                      example: null
                    tpsl:
                      type: object
                      description: Take profit and stop loss configuration
                      nullable: true
                      properties:
                        takeProfitId:
                          type: integer
                          description: Take profit order ID
                          example: 123
                        takeProfit:
                          type: string
                          description: Take profit price
                          example: "50000"
                        stopLossId:
                          type: integer
                          description: Stop loss order ID
                          example: 124
                        stopLoss:
                          type: string
                          description: Stop loss price
                          example: "35000"
                    unrealizedFunding:
                      type: string
                      description: "Funding fees accrued since the last position state change
                        and not yet realized. For margin positions, the value accumulates
                        continuously and is settled into the funding field when the position
                        state changes (e.g., on partial or full close). For futures markets
                        (BTC_PERP and other _PERP pairs), always \"0\" — futures funding is
                        applied via periodic balance updates, not tracked per position."
                      example: "0.0019142920201966"
              example:
                - positionId: 527
                  market: "BTC_USDT"
                  openDate: 1651568067.789679
                  modifyDate: 1651568067.789679
                  amount: "0.1"
                  basePrice: "45658.349"
                  liquidationPrice: null
                  liquidationState: margin_call
                  pnl: "-168.42"
                  pnlPercent: "-0.43"
                  margin: "8316.74"
                  freeMargin: "619385.67"
                  funding: "0"
                  unrealizedFunding: "0.0019142920201966"
                  tpsl:
                    takeProfitId: 123
                    takeProfit: "50000"
                    stopLossId: 124
                    stopLoss: "35000"
                  positionSide: "LONG"
                - positionId: 528
                  market: "ETH_USDT"
                  openDate: 1651568067.789679
                  modifyDate: 1651568067.789679
                  amount: "0.1"
                  basePrice: "5658.349"
                  liquidationPrice: null
                  liquidationState: margin_call
                  pnl: "-168.42"
                  pnlPercent: "-0.43"
                  margin: "8316.74"
                  freeMargin: "19385.67"
                  funding: "0"
                  unrealizedFunding: "0.0020142920201966"
                  tpsl: null
                  positionSide: "LONG"
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/position/close:
    post:
      summary: Close Position
      operationId: closePosition
      description: |
        The endpoint closes an open [collateral](/glossary#balance-collateral) position at the current market price. The system places a market order in the opposite direction to fully close the specified position. Any attached take-profit or stop-loss orders are cancelled automatically.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - positionId
                - market
                - request
                - nonce
              properties:
                positionId:
                  type: integer
                  description: "Unique identifier of the position to close. Obtain from the [open positions](/api-reference/collateral-trading/open-positions) endpoint."
                  example: 123
                positionSide:
                  type: string
                  enum: [LONG, SHORT, BOTH]
                  description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                  example: "LONG"
                market:
                  type: string
                  description: "Market of the position to close. Example: BTC_USDT"
                  example: "BTC_USDT"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              positionId: 123
              positionSide: LONG
              market: BTC_USDT
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Position closed
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/positions/history:
    post:
      summary: Positions History
      operationId: getPositionsHistory
      description: |
        The endpoint returns the history of [collateral](/glossary#balance-collateral) position state changes for the authenticated account. Each record represents a position event (open, partial close, full close, or liquidation) and includes the order details that triggered the change. Use the optional `market` and `positionId` parameters to filter results.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
