  /api/v4/order/cancel/all:
    post:
      summary: Cancel all orders
      operationId: cancelAllOrders
      description: |
        The endpoint cancels all open [orders](/glossary#orders) that match the specified filters. Use the `market` parameter to target a single trading pair, or omit the parameter to cancel across all markets. The `type` parameter filters by order type (`spot`, `margin`, `futures`). When omitted, the endpoint targets all order types.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "type": ["The type must be an array."]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "market": [
              "Market field should be a string.",
              "Market field format is invalid."
            ]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: "Available [market](/glossary#market). Example: BTC_USDT"
                  example: BTC_USDT
                type:
                  type: array
                  description: "Order types to target. Valid values: \"spot\" — standard spot
                    orders. \"margin\" — marginal orders placed on spot markets. Note: the
                    \"margin\" value is not the same as the collateral account balance;
                    \"collateral\" in other endpoints refers to the funding account, whereas
                    \"margin\" here refers specifically to the order type. \"futures\" —
                    marginal orders placed on futures markets (e.g., BTC_PERP). If omitted,
                    the API targets all order types."
                  example: ["spot", "margin", "futures"]
                  items:
                    type: string
                    enum: [spot, margin, futures]
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              market: BTC_USDT
              type:
                - spot
                - margin
                - futures
      responses:
        '200':
          description: Orders cancelled successfully
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/orders:
    post:
      summary: Query unexecuted(active) orders
      operationId: getActiveOrders
      description: |
        The endpoint retrieves [active orders](/glossary#active-orders) (orders not yet executed). The response includes limit, stop-limit, and stop-market orders that remain open on the order book. Use the `market` parameter to filter by trading pair, or omit the parameter to retrieve orders across all markets. The endpoint supports pagination with `limit` and `offset` parameters.

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>

        <Note>
        Search across all markets is available only if client_order_id and order_id are not provided.
        </Note>

        <Note>
        This endpoint supports pagination. Use `limit` (default: 50, max: 100) and `offset` (default: 0, max: 10000) to page through results.
        </Note>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available"]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "limit": ["The limit may not be greater than 100."],
            "offset": ["The offset may not be greater than 10000."]
          }
        }
        ```
        </Accordion>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                  description: "Trading pair to filter by. Format: `BASE_QUOTE` (e.g., `BTC_USDT`). Omit to retrieve orders across all markets."
                  example: BTC_USDT
                order_id:
                  type: integer
                  description: "Filter by a specific order identifier. Returns only the matching active order."
                  example: 3134995325
                client_order_id:
                  type: string
                  description: "Filter by custom client order identifier. Returns only the matching active order."
                  example: "customId11"
                offset:
                  type: integer
                  default: 0
                  minimum: 0
                  maximum: 10000
                  description: "Number of records to skip. Default: `0`. Maximum: `10000`."
                  example: 0
                limit:
                  type: integer
                  default: 50
                  minimum: 1
                  maximum: 100
                  description: "Maximum number of records to return. Default: `50`. Minimum: `1`. Maximum: `100`."
                  example: 50
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: List of active orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/trade-account/executed-history:
    post:
      summary: Query executed order history
