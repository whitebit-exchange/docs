                  type: string
                  enum: [buy, sell]
                amount:
                  type: string
                price:
                  type: string
                activation_price:
                  type: string
                stopLoss:
                  type: string
                takeProfit:
                  type: string
                clientOrderId:
                  type: string
                positionSide:
                  type: string
                  enum: [long, short]
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - stop-limit order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: integer
                    description: Unique order identifier
                    example: 4180284841
                  clientOrderId:
                    type: string
                    description: Custom client order identifier. Empty string if not specified
                    example: "order1987111"
                  market:
                    type: string
                    description: Market name
                    example: "BTC_USDT"
                  side:
                    type: string
                    description: Order side
                    enum: [buy, sell]
                    example: "buy"
                  type:
                    type: string
                    description: Order type
                    example: "stop limit"
                  timestamp:
                    type: number
                    description: Timestamp of order creation in Unix format
                    example: 1595792396.165973
                  dealMoney:
                    type: string
                    description: Amount in money currency that is finished
                    example: "0"
                  dealStock:
                    type: string
                    description: Amount in stock currency that is finished
                    example: "0"
                  amount:
                    type: string
                    description: Order amount
                    example: "0.001"
                  left:
                    type: string
                    description: Remaining amount that must be finished
