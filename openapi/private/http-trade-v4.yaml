openapi: 3.0.3
info:
  title: Private HTTP API V4 - Collateral Trading
  description: |
    WhiteBIT Private HTTP API V4 for collateral/margin trading operations.
    
    Base URL: https://whitebit.com
    
    All endpoints return time in Unix-time format.
    All endpoints return either a JSON object or array.
    For receiving responses from API calls please use http method POST.
    
    Authentication required for all endpoints.
  version: 4.0.0
  license:
    name: WhiteBIT Terms of Service
    url: https://whitebit.com/terms
servers:
  - url: https://whitebit.com
    description: WhiteBIT Global Server
  - url: https://whitebit.eu
    description: WhiteBIT EU Server

security:
  - ApiKeyAuth: []
    PayloadAuth: []
    SignatureAuth: []

paths:
  /api/v4/collateral-account/balance:
    post:
      summary: Collateral Account Balance
      operationId: collateralAccountBalance
      description: |
        The endpoint returns the current [collateral balance](/glossary#balance-collateral) for one or all assets. The response maps each asset ticker to its collateral balance amount. Use the optional `ticker` parameter to filter results to a single asset.

        <Note>
        The API does not cache the response.
        </Note>
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "ticker": ["ticker is invalid."]
          }
        }
        ```
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                  description: |
                    [Asset](/glossary#assets) to be filtered. For example: BTC
                    
                    If not specified, returns balances for all assets.
                  example: BTC
                request:
                  type: string
                  description: Request signature
                  example: "{{request}}"
                nonce:
                  type: string
                  description: Unique request identifier
                  example: "{{nonce}}"
            example:
              ticker: BTC
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns collateral balances by asset
          content:
            application/json:
              schema:
                type: object
                description: "Object mapping asset tickers to collateral balance amounts. Each key is an asset ticker (e.g., `BTC`, `USDT`) and the value is the balance in that asset's native units."
                additionalProperties:
                  type: number
                  description: "Collateral balance in the asset's native units"
              example:
                BTC: 1
                USDT: 1000
                ETH: 5.5
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/balance-summary:
    post:
      summary: Collateral Account Balance Summary
      operationId: collateralAccountBalanceSummary
      description: |
        The endpoint returns a detailed [collateral balance](/glossary#balance-collateral) summary with a per-asset breakdown. Each record includes the current balance, borrowed amount, and available balance with and without borrowing capacity. Use the optional `ticker` parameter to filter results to a single asset.

        <Note>
        The API does not cache the response.
        </Note>
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "ticker": ["ticker is invalid."]
          }
        }
        ```
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                  description: |
                    Filter by requested asset. For example: BTC
                    
                    If not specified, returns summary for all assets.
                  example: BTC
                request:
                  type: string
                  description: Request signature
                  example: "{{request}}"
                nonce:
                  type: string
                  description: Unique request identifier
                  example: "{{nonce}}"
            example:
              ticker: BTC
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns detailed balance information per asset
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    asset:
                      type: string
                      description: Asset ticker symbol
                      example: BTC
                    balance:
                      type: string
                      description: "Total collateral balance for the asset, in the asset's native units"
                      example: "0.5"
                    borrow:
                      type: string
                      description: "Amount currently borrowed against the asset, in the asset's native units"
                      example: "0"
                    availableWithoutBorrow:
                      type: string
                      description: "Balance available for use without additional borrowing, in the asset's native units"
                      example: "0.5"
                    availableWithBorrow:
                      type: string
                      description: "Maximum balance available when borrowing capacity is included, in the asset's native units"
                      example: "123.456"
              example:
                - asset: "BTC"
                  balance: "0.5"
                  borrow: "0"
                  availableWithoutBorrow: "0.5"
                  availableWithBorrow: "123.456"
                - asset: "USDT"
                  balance: "1000"
                  borrow: "0"
                  availableWithoutBorrow: "1000"
                  availableWithBorrow: "5000"
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/collateral/limit:
    post:
      summary: Collateral Limit Order
      operationId: createCollateralLimitOrder
      description: |
        The endpoint creates a [limit order](/glossary#limit-order) using [collateral balance](/glossary#balance-collateral). The order executes at the specified price or better. Use `buy` to open or increase a long position and `sell` to open or increase a short position. To close a position, place an opposite-side order matching the position amount.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Note>
        For open long position use **buy**, for short **sell**. To close current position, place opposite order with current position amount.
        </Note>

        <Note>
          - RPI orders are post-only by design and cannot be used with the IOC flag. The API returns error code `37` when both `rpi=true` and `ioc=true` are used.
        </Note>
        
        
        <Accordion title="Error Codes">
          - `30` - default validation error code
          - `31` - market validation failed
          - `32` - amount validation failed
          - `33` - price validation failed
          - `36` - client_order_id validation failed
          - `37` - `ioc=true` cannot be used with `postOnly=true` or `rpi=true`
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - side
                - amount
                - price
                - request
                - nonce
              properties:
                market:
                  type: string
                  description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                side:
                  type: string
                  enum: [buy, sell]
                  description: "Order type. Variables: 'buy' / 'sell'. For open long position use **buy**, for short **sell**."
                  example: "buy"
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency to buy or sell. Minimum and step values are market-dependent — query the [market info](/api-reference/market-data/market-info) endpoint for constraints."
                  example: "0.01"
                price:
                  type: string
                  description: "Limit order price in [money](/glossary#money) currency. Minimum price step is market-dependent — query the [market info](/api-reference/market-data/market-info) endpoint for constraints."
                  example: "40000"
                client_order_id:
                  type: string
                  description: "Custom order identifier. Must be unique and contain only letters, numbers, dashes, dots, or underscores."
                  example: "order1987111"
                stopLoss:
                  type: string
                  description: |
                    Stop loss price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a stop loss condition.
                  example: "50000"
                takeProfit:
                  type: string
                  description: |
                    Take profit price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a take profit condition.
                  example: "30000"
                postOnly:
                  type: boolean
                  default: false
                  description: "When `true`, guarantees the order executes as a [maker](/glossary#maker) order. The system rejects the order if it would immediately match as taker. Default: `false`."
                  example: false
                ioc:
                  type: boolean
                  default: false
                  description: "When `true`, the order executes all or part immediately and cancels any unfilled portion. Cannot be combined with `postOnly=true` or `rpi=true`."
                  example: false
                rpi:
                  type: boolean
                  default: false
                  description: |
                    Enables Retail Price Improvement (RPI) mode.

                    RPI orders are post-only by design and cannot be used with `ioc=true`. The API returns error code `37` when both `rpi=true` and `ioc=true` are used.
                  example: true
                positionSide:
                  type: string
                  enum: [LONG, SHORT, BOTH]
                  description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                  example: "LONG"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              market: BTC_USDT
              side: buy
              amount: "0.01"
              price: "40000"
              postOnly: false
              ioc: false
              client_order_id: order1987111
              stopLoss: "50000"
              takeProfit: "30000"
              positionSide: LONG
              rpi: true
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: integer
                    description: Unique order identifier
                    example: 4180284841
                  client_order_id:
                    type: string
                    description: Custom client order identifier. Empty string if not specified
                    example: "order1987111"
                  market:
                    type: string
                    description: Market name
                    example: "BTC_USDT"
                  side:
                    type: string
                    description: Order side
                    enum: [buy, sell]
                    example: "buy"
                  type:
                    type: string
                    description: Order type
                    example: "limit"
                  timestamp:
                    type: number
                    description: "Unix timestamp in seconds (UTC) of order creation, with microsecond precision."
                    example: 1595792396.165973
                  deal_money:
                    type: string
                    description: Amount in money currency that is finished
                    example: "0"
                  deal_stock:
                    type: string
                    description: Amount in stock currency that is finished
                    example: "0"
                  amount:
                    type: string
                    description: Order amount
                    example: "0.01"
                  left:
                    type: string
                    description: Remaining amount that must be finished
                    example: "0.001"
                  deal_fee:
                    type: string
                    description: Fee in money that is paid when order is finished
                    example: "0"
                  price:
                    type: string
                    description: Order price
                    example: "40000"
                  postOnly:
                    type: boolean
                    description: Post-only flag
                    example: false
                  ioc:
                    type: boolean
                    description: Immediate or cancel flag
                    example: false
                  status:
                    type: string
                    description: Order status
                    enum: [NEW, FILLED, PARTIALLY_FILLED, CANCELLED]
                    example: "FILLED"
                  stp:
                    type: string
                    description: Self trade prevention mode
                    example: "no"
                  oto:
                    type: object
                    description: OTO order data when stopLoss or takeProfit is specified
                    nullable: true
                    properties:
                      otoId:
                        type: integer
                        description: OTO order identifier
                        example: 29457221
                      stopLoss:
                        type: string
                        description: Stop loss order price
                        example: "30000"
                      takeProfit:
                        type: string
                        description: Take profit order price
                        example: "50000"
                  positionSide:
                    type: string
                    description: Position side
                    enum: [LONG, SHORT, BOTH]
                    example: "LONG"
                  rpi:
                    type: boolean
                    description: Retail Price Improvement flag
                    example: true
              example:
                order_id: 4180284841
                client_order_id: "order1987111"
                market: "BTC_USDT"
                side: "buy"
                type: "limit"
                timestamp: 1595792396.165973
                deal_money: "0"
                deal_stock: "0"
                amount: "0.01"
                left: "0.001"
                deal_fee: "0"
                price: "40000"
                postOnly: false
                ioc: false
                status: "FILLED"
                stp: "no"
                oto:
                  otoId: 29457221
                  stopLoss: "30000"
                  takeProfit: "50000"
                positionSide: "LONG"
                rpi: true
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/collateral/bulk:
    post:
      summary: Collateral bulk limit order
      operationId: createCollateralBulkOrder
      description: |
        The endpoint creates multiple collateral [limit orders](/glossary#limit-order) in a single request. Each order in the `orders` array is validated and processed individually. The `stopOnFail` parameter controls whether processing stops at the first failure or continues through all orders. The response array contains a result or error object for each submitted order, in the same order as the request.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  items:
                    type: object
                    properties:
                      market:
                        type: string
                        description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                        example: "BTC_PERP"
                      side:
                        type: string
                        enum: [buy, sell]
                        description: "Order type. Variables: 'buy' / 'sell'."
                        example: "buy"
                      amount:
                        type: string
                        description: "Amount of [stock](/glossary#stock) currency to buy or sell. Minimum and step values are market-dependent — query the [market info](/api-reference/market-data/market-info) endpoint for constraints."
                        example: "0.02"
                      price:
                        type: string
                        description: "Limit order price in [money](/glossary#money) currency. Minimum price step is market-dependent."
                        example: "40000"
                      client_order_id:
                        type: string
                        description: "Identifier must be unique and contain letters, numbers, dashes, dots, or underscores."
                        example: ""
                      stopLoss:
                        type: string
                        description: |
                          Stop loss price.

                          When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a stop loss condition.
                        example: "50000"
                      takeProfit:
                        type: string
                        description: |
                          Take profit price.

                          When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a take profit condition.
                        example: "30000"
                      postOnly:
                        type: boolean
                        default: false
                        description: "Ensures the order adds liquidity and executes as maker. Default: `false`."
                        example: false
                      ioc:
                        type: boolean
                        default: false
                        description: |
                          Immediate-or-cancel (IOC) executes all or part of an order immediately and cancels any unfilled portion. Default: `false`.

                          IOC does not support `rpi=true` because RPI uses post-only behavior by design.
                          The API returns error code `37` when an order item sets both `ioc=true` and `rpi=true`.
                        example: false
                      rpi:
                        type: boolean
                        default: false
                        description: |
                          Enables Retail Price Improvement (RPI) mode. Default: `false`.

                          RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
                          The API returns error code `37` when an order item sets both `rpi=true` and `ioc=true`.
                        example: true
                      positionSide:
                        type: string
                        enum: [LONG, SHORT, BOTH]
                        description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                        example: "LONG"
                stopOnFail:
                  type: boolean
                  default: false
                  description: |
                    Controls how the bulk order processor handles failures.

                    When true: Processing stops at the first order that fails validation or execution. Only orders up to (but not including) the failed order are processed.

                    When false (default): All orders in the bulk request are processed regardless of individual failures. Each order result is returned in the response array.
                  example: true
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              orders:
                - side: buy
                  amount: "0.02"
                  price: "40000"
                  market: BTC_PERP
                  postOnly: false
                  ioc: false
                  client_order_id: ""
                  positionSide: LONG
                  rpi: true
                - side: sell
                  amount: "0.0001"
                  price: "41000"
                  market: BTC_USDT
                  postOnly: false
                  ioc: false
                  client_order_id: ""
                  positionSide: LONG
                  rpi: true
                - side: sell
                  amount: "0.02"
                  price: "0.030"
                  market: ETH_BTC
                  postOnly: false
                  ioc: false
                  client_order_id: ""
                  positionSide: LONG
                  rpi: true
              stopOnFail: true
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns array of order results
          content:
            application/json:
              schema:
                type: array
                description: Array of order creation results. Each item contains either a successful result or an error.
                items:
                  type: object
                  properties:
                    result:
                      type: object
                      nullable: true
                      description: Order data when successful, null when failed
                      properties:
                        order_id:
                          type: integer
                          description: Unique order identifier
                          example: 4326248250
                        client_order_id:
                          type: string
                          description: Custom client order identifier. Empty string if not specified
                          example: ""
                        market:
                          type: string
                          description: Market name
                          example: "BTC_USDT"
                        side:
                          type: string
                          description: Order side
                          enum: [buy, sell]
                          example: "buy"
                        type:
                          type: string
                          description: Order type
                          example: "limit"
                        timestamp:
                          type: number
                          description: "Unix timestamp in seconds (UTC) of order creation, with microsecond precision."
                          example: 1684916268.825564
                        deal_money:
                          type: string
                          description: Amount in money currency that is finished
                          example: "641.988"
                        deal_stock:
                          type: string
                          description: Amount in stock currency that is finished
                          example: "0.02"
                        amount:
                          type: string
                          description: Order amount
                          example: "0.02"
                        left:
                          type: string
                          description: Remaining amount that must be finished
                          example: "0"
                        deal_fee:
                          type: string
                          description: Fee in money that is paid when order is finished
                          example: "1.283976"
                        price:
                          type: string
                          description: Order price
                          example: "40000"
                        postOnly:
                          type: boolean
                          description: Post-only flag
                          example: false
                        ioc:
                          type: boolean
                          description: Immediate or cancel flag
                          example: false
                        status:
                          type: string
                          description: Order status
                          enum: [NEW, FILLED, PARTIALLY_FILLED, CANCELLED]
                          example: "FILLED"
                        stp:
                          type: string
                          description: Self trade prevention mode
                          example: "no"
                        positionSide:
                          type: string
                          description: Position side
                          enum: [LONG, SHORT, BOTH]
                          example: "LONG"
                        rpi:
                          type: boolean
                          description: Retail Price Improvement flag
                          example: true
                    error:
                      type: object
                      nullable: true
                      description: Error details when order creation failed, null when successful
                      properties:
                        code:
                          type: integer
                          description: Error code
                          example: 32
                        message:
                          type: string
                          description: Error message
                          example: "Validation failed"
                        errors:
                          type: object
                          description: Detailed validation errors
                          additionalProperties:
                            type: array
                            items:
                              type: string
                          example:
                            amount: ["Given amount is less than min amount 0.001."]
              example:
                - result:
                    order_id: 4326248250
                    client_order_id: ""
                    market: "BTC_USDT"
                    side: "buy"
                    type: "limit"
                    timestamp: 1684916268.825564
                    deal_money: "641.988"
                    deal_stock: "0.02"
                    amount: "0.02"
                    left: "0"
                    deal_fee: "1.283976"
                    ioc: false
                    postOnly: false
                    price: "40000"
                    status: "FILLED"
                    stp: "no"
                    positionSide: "LONG"
                    rpi: true
                  error: null
                - result: null
                  error:
                    code: 32
                    message: "Validation failed"
                    errors:
                      amount: ["Given amount is less than min amount 0.001."]
                - result:
                    order_id: 4326248250
                    client_order_id: ""
                    market: "BTC_USDT"
                    side: "sell"
                    type: "limit"
                    timestamp: 1684916268.825564
                    deal_money: "641.988"
                    deal_stock: "0.02"
                    amount: "0.02"
                    left: "0"
                    deal_fee: "1.283976"
                    ioc: false
                    postOnly: false
                    price: "41000"
                    status: "FILLED"
                    stp: "no"
                    positionSide: "LONG"
                    rpi: true
                  error: null
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/collateral/market:
    post:
      summary: Collateral Market Order
      operationId: createCollateralMarketOrder
      description: |
        The endpoint creates a [market order](/glossary#market-order) using [collateral balance](/glossary#balance-collateral). The order executes immediately at the best available market price. Optionally attach `stopLoss` and `takeProfit` prices to create an [OTO](/glossary#one-triggers-the-other-oto) order that activates after the market order fills.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - side
                - amount
                - request
                - nonce
              properties:
                market:
                  type: string
                  description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                side:
                  type: string
                  enum: [buy, sell]
                  description: "Order direction. Use `buy` to open or increase a long position and `sell` to open or increase a short position."
                  example: "buy"
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency to buy or sell. Minimum and step values are market-dependent — query the [market info](/api-reference/market-data/market-info) endpoint for constraints."
                  example: "0.01"
                client_order_id:
                  type: string
                  description: "Custom order identifier. Must be unique and contain only letters, numbers, dashes, dots, or underscores."
                  example: "order1987111"
                stopLoss:
                  type: string
                  description: |
                    Stop loss price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a stop loss condition.
                  example: "50000"
                takeProfit:
                  type: string
                  description: |
                    Take profit price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a take profit condition.
                  example: "40000"
                positionSide:
                  type: string
                  enum: [LONG, SHORT, BOTH]
                  description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                  example: "LONG"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              market: BTC_USDT
              side: buy
              amount: "0.01"
              client_order_id: order1987111
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - market order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: integer
                    description: Unique order identifier
                    example: 4180284841
                  client_order_id:
                    type: string
                    description: Custom client order identifier. Empty string if not specified
                    example: "order1987111"
                  market:
