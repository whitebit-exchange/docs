  /api/v4/trade-account/order:
    post:
      summary: Query executed order deals
      operationId: getOrderDeals
      description: |
        The endpoint retrieves individual trade fills (deals) for a specific order. Each deal represents a partial or full execution of the order against a counterparty. The response includes pagination and returns deal details such as price, amount, fee, and execution role (maker or taker).

        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>

        <Note>
        This endpoint supports pagination. Use `limit` (default: 50) and `offset` (default: 0) to page through results.
        </Note>
      tags:
        - Spot Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
                - request
                - nonce
              properties:
                order_id:
                  type: integer
                  description: "Identifier of the order to retrieve deals for."
                  example: 3134995325
                offset:
                  type: integer
                  default: 0
                  minimum: 0
                  description: "Number of records to skip. Default: `0`."
                  example: 0
                limit:
                  type: integer
                  default: 50
                  minimum: 1
                  description: "Maximum number of records to return. Default: `50`."
                  example: 50
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
      responses:
        '200':
          description: Successful response - returns paginated order deals
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    description: Array of deal records
                    items:
                      type: object
                      properties:
                        time:
                          type: number
                          description: "Unix timestamp of the deal execution, with microsecond precision."
                          example: 1593342324.613711
                        fee:
                          type: string
                          description: "Fee charged for the deal, denominated in the asset specified by `feeAsset`."
                          example: "0.00000419198"
                        price:
                          type: string
                          description: "Execution price per unit in quote currency."
                          example: "0.00000701"
                        amount:
                          type: string
                          description: "Executed quantity in base (stock) currency."
                          example: "598"
                        id:
                          type: integer
                          description: "Unique deal identifier assigned by the matching engine."
                          example: 149156519
                        dealOrderId:
                          type: integer
                          description: "Identifier of the counterparty order that matched against the queried order."
                          example: 3134995325
                        client_order_id:
                          type: string
                          description: "Custom order identifier supplied in the original order request. Returns an empty string when not specified."
                          example: "customId11"
                        role:
                          type: integer
                          description: "Execution role in the deal. `1` = maker (order was resting on the book), `2` = taker (order matched immediately)."
                          enum: [1, 2]
                          example: 2
                        deal:
                          type: string
                          description: "Total deal value in quote (money) currency. Equals `amount * price`."
                          example: "0.00419198"
                        feeAsset:
                          type: string
                          description: "Currency ticker of the asset used to pay the trading fee."
                          example: "USDT"
                        rpi:
                          type: boolean
                          description: "Retail Price Improvement flag. `true` when the deal executed under RPI pricing."
                          example: true
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
              example:
                records:
                  - time: 1593342324.613711
                    fee: "0.00000419198"
                    price: "0.00000701"
                    amount: "598"
                    id: 149156519
                    dealOrderId: 3134995325
                    client_order_id: "customId11"
                    role: 2
                    deal: "0.00419198"
                    feeAsset: "USDT"
                    rpi: true
                offset: 0
                limit: 100
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

