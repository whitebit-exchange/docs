  /api/v4/convert/estimate:
    post:
      summary: Convert Estimate
      description: |
        The endpoint creates a quote for converting one currency to another. Quote lifetime is 10 seconds, then quote will be expired.
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      operationId: convertEstimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - to
                - direction
                - amount
              properties:
                from:
                  type: string
                  description: "From currency. Example: BTC"
                  example: "BTC"
                to:
                  type: string
                  description: "To currency. Example: USDT"
                  example: "USDT"
                direction:
                  type: string
                  description: "Convert amount direction, defines in which currency corresponding \"amount\" field is populated. Use \"to\" in case amount is in \"to\" currency, use \"from\" if amount is in \"from\" currency"
                  enum: ["from", "to"]
                  example: "to"
                amount:
                  type: string
                  description: "Amount to convert or receive."
                  example: "35,103.1"
                nonce:
                  type: integer
                  description: "Nonce for request"
                request:
                  type: string
                  description: "Request path"
            examples:
              estimateReceive:
                summary: "Estimate convert of BTC to receive 35,103.1 USDT"
                value:
                  amount: "35,103.1"
                  direction: "to"
                  from: "BTC"
                  to: "USDT"
              estimateGive:
                summary: "Estimate convert of 1 BTC to USDT"
                value:
                  amount: "1"
                  direction: "from"
                  from: "BTC"
