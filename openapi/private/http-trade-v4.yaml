      operationId: createCollateralOcoOrder
      description: |
        The endpoint creates a collateral [OCO](/glossary#one-cancels-the-other-oco) (one-cancels-the-other) order using [collateral balance](/glossary#balance-collateral). An OCO order combines a limit order (take-profit leg) and a stop-limit order (stop-loss leg) into a single conditional group. When one leg executes, the system cancels the other automatically.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - side
                - amount
                - price
                - activation_price
                - stop_limit_price
                - request
                - nonce
              properties:
                market:
                  type: string
                  description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                  example: "BTC_USDT"
                side:
                  type: string
                  enum: [buy, sell]
                  description: "Order direction. Use `buy` to open or increase a long position and `sell` to open or increase a short position."
                  example: "buy"
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency for both legs of the OCO order. Minimum and step values are market-dependent — query the [market info](/api-reference/market-data/market-info) endpoint for constraints."
                  example: "0.001"
                price:
                  type: string
                  description: "Limit order price in [money](/glossary#money) currency for the take-profit leg."
                  example: "40000"
                activation_price:
                  type: string
                  description: "Trigger price in [money](/glossary#money) currency for the stop-loss leg. The stop-limit order activates when the market price reaches the specified value."
                  example: "41000"
                stop_limit_price:
                  type: string
                  description: "Execution price in [money](/glossary#money) currency for the stop-loss leg. After activation, the stop-loss leg places a limit order at the specified price."
                  example: "42000"
                client_order_id:
                  type: string
                  description: "Custom order identifier. Must be unique and contain only letters, numbers, dashes, dots, or underscores."
                  example: "order1987111"
                request:
                  type: string
                  example: "{{request}}"
                nonce:
                  type: string
                  example: "{{nonce}}"
            example:
              market: BTC_USDT
              side: buy
              amount: "0.001"
              price: "40000"
              activation_price: "41000"
              stop_limit_price: "42000"
              client_order_id: order1987111
              request: "{{request}}"
              nonce: "{{nonce}}"
      responses:
        '200':
          description: Successful response - OCO order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: OCO order identifier
                    example: 117703764513
