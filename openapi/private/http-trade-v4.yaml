        '200':
          description: Successful response - returns paginated order deals
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    description: Array of deal records
                    items:
                      type: object
                      properties:
                        time:
                          type: number
                          description: Timestamp of executed order
                          example: 1593342324.613711
                        fee:
                          type: string
                          description: Fee paid
                          example: "0.00000419198"
                        price:
                          type: string
                          description: Deal price
                          example: "0.00000701"
                        amount:
                          type: string
                          description: Amount in stock
                          example: "598"
                        id:
                          type: integer
                          description: Deal identifier
                          example: 149156519
                        dealOrderId:
                          type: integer
                          description: Completed order identifier
                          example: 3134995325
                        clientOrderId:
                          type: string
                          description: Custom order identifier. Empty string if not specified
                          example: "customId11"
                        role:
                          type: integer
                          description: Role in the deal (1 - maker, 2 - taker)
                          enum: [1, 2]
                          example: 2
                        deal:
                          type: string
                          description: Amount in money
                          example: "0.00419198"
                        feeAsset:
                          type: string
                          description: Fee asset
                          example: "USDT"
                        rpi:
                          type: boolean
                          description: Retail Price Improvement flag
                          example: true
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
              example:
                records:
                  - time: 1593342324.613711
                    fee: "0.00000419198"
                    price: "0.00000701"
                    amount: "598"
                    id: 149156519
                    dealOrderId: 3134995325
                    clientOrderId: "customId11"
                    role: 2
                    deal: "0.00419198"
                    feeAsset: "USDT"
                    rpi: true
                offset: 0
                limit: 100
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
