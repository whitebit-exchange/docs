                        positionAmount:
                          type: string
                          description: Position amount at funding time
                          example: "0.019"
                        settlementPrice:
                          type: string
                          description: Settlement price used for funding calculation
                          example: "50938.2"
                        rateCalculatedTime:
                          type: string
                          description: Time when the funding rate was calculated in Unix timestamp format
                          example: "1734364800"
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
              example:
                records:
                  - market: "BTC_PERP"
                    fundingTime: "1734451200"
                    fundingRate: "0.00017674"
                    fundingAmount: "-0.171053531892"
                    positionAmount: "0.019"
                    settlementPrice: "50938.2"
                    rateCalculatedTime: "1734364800"
