  /api/v4/convert/estimate:
    post:
      summary: Convert Estimate
      description: |
        The endpoint creates a quote for converting one currency to another. Quote lifetime is 10 seconds, then quote will be expired.

        <Note>
        The endpoint can be used to obtain a pre-execution price estimate for a market order. Call the endpoint with the desired amount before placing a market order to see the approximate execution price.
        </Note>

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      operationId: convertEstimate
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - to
                - direction
                - amount
              properties:
                from:
                  type: string
                  description: "From currency. Example: BTC"
                  example: "BTC"
                to:
                  type: string
                  description: "To currency. Example: USDT"
                  example: "USDT"
                direction:
                  type: string
                  description: "Convert amount direction, defines in which currency corresponding \"amount\" field is populated. Use \"to\" in case amount is in \"to\" currency, use \"from\" if amount is in \"from\" currency"
                  enum: ["from", "to"]
                  example: "to"
                amount:
                  type: string
                  description: "Amount to convert or receive."
                  example: "35,103.1"
                nonce:
                  type: integer
                  description: "Nonce for request"
                  example: 1699260637
                request:
                  type: string
                  description: "Request path"
                  example: "{{request}}"
            examples:
              estimateReceive:
                summary: "Estimate convert of BTC to receive 35,103.1 USDT"
                value:
                  amount: "35,103.1"
                  direction: "to"
                  from: "BTC"
                  to: "USDT"
              estimateGive:
                summary: "Estimate convert of 1 BTC to USDT"
                value:
                  amount: "1"
                  direction: "from"
                  from: "BTC"
                  to: "USDT"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: "Quote ID"
                    example: "123"
                  from:
                    type: string
                    description: "From currency"
                    example: "BTC"
                  to:
                    type: string
                    description: "To currency"
                    example: "USDT"
                  give:
                    type: string
                    description: "Amount to give"
                    example: "50"
                  receive:
                    type: string
                    description: "Amount to receive"
                    example: "1714988.41577452"
                  rate:
                    type: string
                    description: "Conversion rate expressed in the from→to direction: units of
                      the 'to' currency received per one unit of the 'from' currency. Example: if
                      from=BTC and to=USDT, a rate of \"34299.76\" means 1 BTC is worth approximately
                      34 299.76 USDT at the time of the quote."
                    example: "34299.76831549"
                  expireAt:
                    type: integer
                    description: "Quote expiration timestamp"
                    example: 1699016476
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                termsNotAccepted:
                  summary: "Terms Not Accepted"
                  value:
                    code: 0
                    message: "Validation failed"
                    errors:
                      user: ["Terms of exchange are not accepted"]
                directionInvalid:
                  summary: "Direction Invalid"
                  value:
                    code: 30
                    message: "Validation failed"
                    errors:
                      direction: ["Direction field does not exist in [from,to]."]
                marketsNotAvailable:
                  summary: "Markets Not Available"
                  value:
                    code: 0
                    message: "Validation failed"
                    errors:
                      from: ["Conversion markets not available"]

