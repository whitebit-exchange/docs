  /api/v4/orders/conditional:
    post:
      summary: Query unexecuted(active) conditional orders
      description: |
        The endpoint retrieves active conditional orders.
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                offset:
                  type: integer
                  default: 0
                limit:
                  type: integer
                  default: 50
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - returns paginated conditional orders (OCO and OTO types)
          content:
            application/json:
              schema:
                type: object
                properties:
                  limit:
                    type: integer
                    description: Number of records per page
                    example: 100
                  offset:
                    type: integer
                    description: Number of records skipped
                    example: 0
                  total:
                    type: integer
                    description: Total number of records
                    example: 2
                  records:
                    type: array
                    description: Array of conditional orders (can be OCO or OTO type)
                    items:
                      oneOf:
                        - type: object
                          description: OCO type conditional order
                          properties:
                            id:
                              type: integer
                              example: 117703764513
                            type:
                              type: string
                              enum: [oco]
                              example: "oco"
                            stop_loss:
                              type: object
                              properties:
                                orderId:
                                  type: integer
                                  example: 117703764514
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
                            take_profit:
                              type: object
                              properties:
                                orderId:
                                  type: integer
                                  example: 117703764515
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
                        - type: object
                          description: OTO type conditional order
                          properties:
                            id:
                              type: integer
                              example: 29457221
                            type:
                              type: string
                              enum: [oto]
                              example: "oto"
                            stopLossPrice:
                              type: string
                              example: "30000"
                            takeProfitPrice:
                              type: string
                              example: "50000"
                            conditionalOrder:
                              type: object
                              properties:
                                orderId:
                                  type: integer
                                  example: 3686033640
                                clientOrderId:
                                  type: string
                                  example: "customId11"
                                market:
                                  type: string
                                  example: "BTC_USDT"
                                positionSide:
                                  type: string
                                  enum: [LONG, SHORT, BOTH]
                                  example: "LONG"
              example:
                limit: 100
                offset: 0
                total: 2
                records:
                  - id: 117703764513
                    type: "oco"
                    stop_loss:
                      orderId: 117703764514
                      clientOrderId: ""
                      market: "BTC_USDT"
