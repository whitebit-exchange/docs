  /api/v4/order/cancel:
    post:
      summary: Cancel order
      operationId: cancelOrder
      description: |
        The endpoint cancels an existing [order](/glossary#orders). Provide either `order_id` or `client_order_id` to identify the target order. The response returns the final state of the cancelled order.

        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>

        <Note>
        - Cancellation by client_order_id takes priority over order_id.
        - The request supports working only with order_id or only with client_order_id.
        - Do not pass both values at the same time.
        </Note>
        
        <Accordion title="Error Codes">
        - `30` - default validation error code
        - `31` - market validation failed
        </Accordion>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "market": ["Market field is required."],
            "order_id": ["OrderId field is required."]
          }
        }
        ```
        
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
        ```json
        {
          "code": 31,
          "message": "Validation failed",
          "errors": {
            "market": ["Market is not available."]
          }
        }
        ```
        
