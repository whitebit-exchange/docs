openapi: 3.0.3
info:
  title: Private HTTP API V4 - Collateral Trading
  description: |
    WhiteBIT Private HTTP API V4 for collateral/margin trading operations.
    
    Base URL: https://whitebit.com
    
    All endpoints return time in Unix-time format.
    All endpoints return either a JSON object or array.
    For receiving responses from API calls please use http method POST.
    
    Authentication required for all endpoints.
  version: 4.0.0
servers:
  - url: https://whitebit.com
    description: WhiteBIT Global Server
  - url: https://whitebit.eu
    description: WhiteBIT EU Server

paths:
  /api/v4/collateral-account/balance:
    post:
      summary: Collateral Account Balance
      description: |
        The endpoint returns a current [collateral balance](/glossary#balance-collateral).
        
        <Note>
        The API does not cache the response.
        </Note>
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "ticker": ["ticker is invalid."]
          }
        }
        ```
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                  description: |
                    [Asset](/glossary#assets) to be filtered. For example: BTC
                    
                    If not specified, returns balances for all assets.
                  example: BTC
                request:
                  type: string
                  description: Request signature
                nonce:
                  type: string
                  description: Unique request identifier
      responses:
        '200':
          description: Successful response - returns collateral balances by asset
          content:
            application/json:
              schema:
                type: object
                description: Object with asset tickers as keys and balance amounts as values
                additionalProperties:
                  type: number
                  description: Balance amount for the asset
              example:
                BTC: 1
                USDT: 1000
                ETH: 5.5
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/collateral-account/balance-summary:
    post:
      summary: Collateral Account Balance Summary
      description: |
        The endpoint retrieves collateral account balance summary with detailed breakdown per asset.
        
        <Note>
        The API does not cache the response.
        </Note>
        
        <Warning>
        Rate limit: 12000 requests/10 sec.
        </Warning>
        
        <Accordion title="Errors">
        ```json
        {
          "code": 30,
          "message": "Validation failed",
          "errors": {
            "ticker": ["ticker is invalid."]
          }
        }
        ```
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                  description: |
                    Filter by requested asset. For example: BTC
                    
                    If not specified, returns summary for all assets.
                  example: BTC
                request:
                  type: string
                  description: Request signature
                nonce:
                  type: string
                  description: Unique request identifier
      responses:
        '200':
          description: Successful response - returns detailed balance information per asset
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    asset:
                      type: string
                      description: Asset ticker symbol
                      example: BTC
                    balance:
                      type: string
                      description: Current balance amount
                      example: "0.5"
                    borrow:
                      type: string
                      description: Amount currently borrowed
                      example: "0"
                    availableWithoutBorrow:
                      type: string
                      description: Available balance without using borrow
                      example: "0.5"
                    availableWithBorrow:
                      type: string
                      description: Available balance including borrowing capacity
                      example: "123.456"
              example:
                - asset: "BTC"
                  balance: "0.5"
                  borrow: "0"
                  availableWithoutBorrow: "0.5"
                  availableWithBorrow: "123.456"
                - asset: "USDT"
                  balance: "1000"
                  borrow: "0"
                  availableWithoutBorrow: "1000"
                  availableWithBorrow: "5000"
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/collateral/limit:
    post:
      summary: Collateral Limit Order
      description: |
        The endpoint creates [limit order](/glossary#limit-order) using [collateral balance](/glossary#balance-collateral).
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
        
        <Note>
        For open long position use **buy**, for short **sell**. To close current position, place opposite order with current position amount.
        </Note>

        <Note>
          - RPI orders are post-only by design and cannot be used with the IOC flag. The API returns error code `37` when both `rpi=true` and `ioc=true` are used.
        </Note>

        
        <Accordion title="Error Codes">
          - `30` - default validation error code
          - `31` - market validation failed
          - `32` - amount validation failed
          - `33` - price validation failed
          - `36` - clientOrderId validation failed
          - `37` - `ioc=true` cannot be used with `postOnly=true` or `rpi=true`
        </Accordion>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - market
                - side
                - amount
                - price
                - request
                - nonce
              properties:
                market:
                  type: string
                  description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                side:
                  type: string
                  enum: [buy, sell]
                  description: "Order type. Variables: 'buy' / 'sell'. For open long position use **buy**, for short **sell**."
                amount:
                  type: string
                  description: "Amount of [stock](/glossary#stock) currency to buy or sell."
                price:
                  type: string
                  description: "Price in [money](/glossary#money) currency. Example: '9800'"
                clientOrderId:
                  type: string
                  description: "Identifier should be unique and contain letters, dashes, numbers, dots or underscores."
                stopLoss:
                  type: string
                  description: |
                    Stop loss price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a stop loss condition.
                takeProfit:
                  type: string
                  description: |
                    Take profit price.

                    When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a take profit condition.
                postOnly:
                  type: boolean
                  description: "Orders are guaranteed to be the [maker](/glossary#maker) order when [executed](/glossary#finished-orders)."
                ioc:
                  type: boolean
                  description: "An immediate or cancel order (IOC) is an order that attempts to execute all or part immediately and then cancels any unfilled portion."
                rpi:
                  type: boolean
                  description: |
                    Enables Retail Price Improvement (RPI) mode.

                    RPI orders are post-only by design and cannot be used with `ioc=true`. The API returns error code `37` when both `rpi=true` and `ioc=true` are used.
                  example: true
                positionSide:
                  type: string
                  enum: [long, short, both]
                  description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: integer
                    description: Unique order identifier
                    example: 4180284841
                  clientOrderId:
                    type: string
                    description: Custom client order identifier. Empty string if not specified
                    example: "order1987111"
                  market:
                    type: string
                    description: Market name
                    example: "BTC_USDT"
                  side:
                    type: string
                    description: Order side
                    enum: [buy, sell]
                    example: "buy"
                  type:
                    type: string
                    description: Order type
                    example: "limit"
                  timestamp:
                    type: number
                    description: Timestamp of order creation in Unix format
                    example: 1595792396.165973
                  dealMoney:
                    type: string
                    description: Amount in money currency that is finished
                    example: "0"
                  dealStock:
                    type: string
                    description: Amount in stock currency that is finished
                    example: "0"
                  amount:
                    type: string
                    description: Order amount
                    example: "0.01"
                  left:
                    type: string
                    description: Remaining amount that must be finished
                    example: "0.001"
                  dealFee:
                    type: string
                    description: Fee in money that is paid when order is finished
                    example: "0"
                  price:
                    type: string
                    description: Order price
                    example: "40000"
                  postOnly:
                    type: boolean
                    description: Post-only flag
                    example: false
                  ioc:
                    type: boolean
                    description: Immediate or cancel flag
                    example: false
                  status:
                    type: string
                    description: Order status
                    enum: [NEW, FILLED, PARTIALLY_FILLED, CANCELLED]
                    example: "FILLED"
                  stp:
                    type: string
                    description: Self trade prevention mode
                    example: "no"
                  oto:
                    type: object
                    description: OTO order data when stopLoss or takeProfit is specified
                    nullable: true
                    properties:
                      otoId:
                        type: integer
                        description: OTO order identifier
                        example: 29457221
                      stopLoss:
                        type: string
                        description: Stop loss order price
                        example: "30000"
                      takeProfit:
                        type: string
                        description: Take profit order price
                        example: "50000"
                  positionSide:
                    type: string
                    description: Position side
                    enum: [LONG, SHORT, BOTH]
                    example: "LONG"
                  rpi:
                    type: boolean
                    description: Retail Price Improvement flag
                    example: true
              example:
                orderId: 4180284841
                clientOrderId: "order1987111"
                market: "BTC_USDT"
                side: "buy"
                type: "limit"
                timestamp: 1595792396.165973
                dealMoney: "0"
                dealStock: "0"
                amount: "0.01"
                left: "0.001"
                dealFee: "0"
                price: "40000"
                postOnly: false
                ioc: false
                status: "FILLED"
                stp: "no"
                oto:
                  otoId: 29457221
                  stopLoss: "30000"
                  takeProfit: "50000"
                positionSide: "LONG"
                rpi: true
        '422':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

  /api/v4/order/collateral/bulk:
    post:
      summary: Collateral bulk limit order
      description: |
        The endpoint creates multiple collateral limit orders.
        
        <Warning>
        Rate limit: 10000 requests/10 sec.
        </Warning>
      tags:
        - Collateral Trading
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  items:
                    type: object
                    properties:
                      market:
                        type: string
                        description: "Available margin [market](/glossary#market). Example: BTC_USDT"
                      side:
                        type: string
                        enum: [buy, sell]
                        description: "Order type. Variables: 'buy' / 'sell'."
                      amount:
                        type: string
                        description: "Amount of [stock](/glossary#stock) currency to buy or sell."
                      price:
                        type: string
                        description: "Price in [money](/glossary#money) currency."
                      clientOrderId:
                        type: string
                        description: "Identifier must be unique and contain letters, numbers, dashes, dots, or underscores."
                      stopLoss:
                        type: string
                        description: |
                          Stop loss price.

                          When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a stop loss condition.
                      takeProfit:
                        type: string
                        description: |
                          Take profit price.

                          When provided, the system creates an [OTO](/glossary#one-triggers-the-other-oto) order with a take profit condition.
                      postOnly:
                        type: boolean
                        description: "Ensures the order adds liquidity and executes as maker."
                      ioc:
                        type: boolean
                        description: |
                          Immediate-or-cancel (IOC) executes all or part of an order immediately and cancels any unfilled portion.

                          IOC does not support `rpi=true` because RPI uses post-only behavior by design.
                          The API returns error code `37` when an order item sets both `ioc=true` and `rpi=true`.
                      rpi:
                        type: boolean
                        description: |
                          Enables Retail Price Improvement (RPI) mode.

                          RPI orders use post-only behavior by design. An RPI order does not support `ioc=true`.
                          The API returns error code `37` when an order item sets both `rpi=true` and `ioc=true`.
                        example: true
                      positionSide:
                        type: string
                        enum: [long, short, both]
                        description: "Defines the position direction when hedge mode is enabled. See [positionSide](/glossary#position-side)"
                stopOnFail:
                  type: boolean
                  default: false
                  description: |
                    Controls how the bulk order processor handles failures.

                    When true: Processing stops at the first order that fails validation or execution. Only orders up to (but not including) the failed order are processed.

                    When false (default): All orders in the bulk request are processed regardless of individual failures. Each order result is returned in the response array.
                request:
                  type: string
                nonce:
                  type: string
      responses:
        '200':
          description: Successful response - returns array of order results
          content:
            application/json:
              schema:
                type: array
                description: Array of order creation results. Each item contains either a successful result or an error.
                items:
                  type: object
                  properties:
                    result:
                      type: object
                      nullable: true
                      description: Order data when successful, null when failed
                      properties:
                        orderId:
                          type: integer
                          description: Unique order identifier
                          example: 4326248250
                        clientOrderId:
                          type: string
                          description: Custom client order identifier. Empty string if not specified
                          example: ""
                        market:
                          type: string
                          description: Market name
                          example: "BTC_USDT"
                        side:
                          type: string
                          description: Order side
                          enum: [buy, sell]
                          example: "buy"
                        type:
                          type: string
                          description: Order type
                          example: "limit"
                        timestamp:
                          type: number
                          description: Timestamp of order creation in Unix format
                          example: 1684916268.825564
                        dealMoney:
                          type: string
                          description: Amount in money currency that is finished
                          example: "641.988"
                        dealStock:
                          type: string
                          description: Amount in stock currency that is finished
                          example: "0.02"
                        amount:
                          type: string
                          description: Order amount
                          example: "0.02"
                        left:
                          type: string
                          description: Remaining amount that must be finished
                          example: "0"
                        dealFee:
                          type: string
                          description: Fee in money that is paid when order is finished
                          example: "1.283976"
                        price:
                          type: string
                          description: Order price
                          example: "40000"
                        postOnly:
                          type: boolean
                          description: Post-only flag
                          example: false
                        ioc:
                          type: boolean
                          description: Immediate or cancel flag
                          example: false
                        status:
                          type: string
                          description: Order status
                          enum: [NEW, FILLED, PARTIALLY_FILLED, CANCELLED]
                          example: "FILLED"
                        stp:
                          type: string
                          description: Self trade prevention mode
                          example: "no"
                        positionSide:
                          type: string
                          description: Position side
                          enum: [LONG, SHORT, BOTH]
                          example: "LONG"
                        rpi:
                          type: boolean
                          description: Retail Price Improvement flag
                          example: true
                    error:
                      type: object
                      nullable: true
                      description: Error details when order creation failed, null when successful
                      properties:
                        code:
                          type: integer
                          description: Error code
                          example: 32
                        message:
                          type: string
                          description: Error message
                          example: "Validation failed"
                        errors:
                          type: object
                          description: Detailed validation errors
                          additionalProperties:
                            type: array
                            items:
                              type: string
                          example:
                            amount: ["Given amount is less than min amount 0.001."]
              example:
                - result:
                    orderId: 4326248250
                    clientOrderId: ""
                    market: "BTC_USDT"
                    side: "buy"
                    type: "limit"
                    timestamp: 1684916268.825564
                    dealMoney: "641.988"
                    dealStock: "0.02"
                    amount: "0.02"
                    left: "0"
                    dealFee: "1.283976"
                    ioc: false
                    postOnly: false
                    price: "40000"
                    status: "FILLED"
                    stp: "no"
                    positionSide: "LONG"
                    rpi: true
                  error: null
                - result: null
                  error:
                    code: 32
                    message: "Validation failed"
                    errors:
                      amount: ["Given amount is less than min amount 0.001."]
                - result:
                    orderId: 4326248250
                    clientOrderId: ""
                    market: "BTC_USDT"
                    side: "sell"
                    type: "limit"
                    timestamp: 1684916268.825564
                    dealMoney: "641.988"
                    dealStock: "0.02"
                    amount: "0.02"
                    left: "0"
                    dealFee: "1.283976"
                    ioc: false
                    postOnly: false
                    price: "41000"
                    status: "FILLED"
                    stp: "no"
                    positionSide: "LONG"
                    rpi: true
                  error: null
        '400':
          description: Inner validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Request validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service temporarily unavailable

