openapi: 3.0.3
info:
  title: Private HTTP API V4 - Address Checker (AML)
  description: |
    WhiteBIT Address Checker API for B2B accounts. Programmatic access to address screening before processing blockchain transactions.

    Base URL: https://whitebit.com

    Authentication required for all endpoints. The API key must include the **Address Checker** permission.

    Each successful check is billed at 2 USDT, deducted from the main balance. Failed and invalid requests are not charged. Ensure sufficient main balance before initiating checks.
  version: 4.0.0
  license:
    name: WhiteBIT Terms of Service
    url: https://whitebit.com/terms
servers:
  - url: https://whitebit.com
    description: WhiteBIT Global Server
  - url: https://whitebit.eu
    description: WhiteBIT EU Server

security:
  - ApiKeyAuth: []
    PayloadAuth: []
    SignatureAuth: []

paths:
  /api/v4/aml/checks/assets:
    post:
      summary: List supported assets
      operationId: amlListSupportedAssets
      description: |
        The endpoint returns the assets and networks supported by the Address Checker.

        <Note>
        Not billed.
        </Note>
      tags:
        - AML
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request:
                  type: string
                  description: Request endpoint path. Required for HMAC signing.
                  example: "/api/v4/aml/checks/assets"
                nonce:
                  type: integer
                  description: Strictly increasing identifier (Unix milliseconds is recommended).
                  example: 1700000000000
                nonceWindow:
                  type: boolean
                  description: When `true`, the server widens the nonce acceptance window. Optional.
                  example: false
              required:
                - request
                - nonce
      responses:
        '200':
          description: List of supported assets and networks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupportedAsset'
              example:
                - asset: "BTC"
                  network: null
                - asset: "USDT"
                  network: "TRC20"
                - asset: "USDT"
                  network: "ERC20"
        '401':
          description: API key lacks the Address Checker permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmlAuthError'
              example:
                code: 4
                message: "This API Key is not authorized to perform this action."
        '404':
          description: The account does not include access to the Address Checker API. Contact Support to request access.
          content:
            application/json:
              schema:
                type: object
              example: {}

  /api/v4/aml/checks/create:
    post:
      summary: Create address check
      operationId: amlCreateCheck
      description: |
        Create and initiate a new address screening request. The endpoint returns an `id` to use with the result endpoint.

        <Warning>
        Successful checks are billed 2 USDT, deducted from the main balance. Failed and invalid requests are not charged. Ensure sufficient main balance before calling the endpoint.
        </Warning>

        Processing typically completes in under 60 seconds; the maximum is 3 minutes. Poll the [result endpoint](/api-reference/aml/get-check-result) using the returned `id`.
      tags:
        - AML
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                asset:
                  type: string
                  description: Asset symbol supported by the Address Checker. Use [List supported assets](/api-reference/aml/list-supported-assets) to discover valid values.
                  example: "USDT"
                address:
                  type: string
                  description: Cryptocurrency address to screen.
                  example: "TXYZ4Lp9zV7nNqPbVQjMzHfx2k8BvPQjsk"
                network:
                  type: string
                  nullable: true
                  description: Network identifier. May be omitted or `null` when the asset has a single network.
                  example: "TRC20"
                request:
                  type: string
                  description: Request endpoint path. Required for HMAC signing.
                  example: "/api/v4/aml/checks/create"
                nonce:
                  type: integer
                  description: Strictly increasing identifier (Unix milliseconds is recommended).
                  example: 1700000000000
              required:
                - asset
                - address
                - request
                - nonce
      responses:
        '200':
          description: |
            On success, the endpoint returns the `id` of the created check.

            <Note>
            A `200` response with an `errors` object indicates a non-fatal validation problem (for example, insufficient main balance). The check is not created and the account is not charged. Inspect `errors` to identify the field at fault.
            </Note>
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CreateCheckResponse'
                  - $ref: '#/components/schemas/CreateCheckValidationError'
              examples:
                success:
                  summary: Check created
                  value:
                    id: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
                insufficientBalance:
                  summary: Insufficient main balance
                  value:
                    errors:
                      balance:
                        - "Insufficient balance"
        '401':
          description: API key lacks the Address Checker permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmlAuthError'
              example:
                code: 4
                message: "This API Key is not authorized to perform this action."
        '404':
          description: The account does not include access to the Address Checker API. Contact Support to request access.
          content:
            application/json:
              schema:
                type: object
              example: {}

  /api/v4/aml/checks/result:
    post:
      summary: Get check result
      operationId: amlGetCheckResult
      description: |
        The endpoint returns the current state of a previously created address screening request. Poll until `status` becomes `Success` or `Failed`.

        <Note>
        Not billed.
        </Note>
      tags:
        - AML
      security:
        - ApiKeyAuth: []
          PayloadAuth: []
          SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Identifier returned by [Create address check](/api-reference/aml/create-address-check).
                  example: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
                request:
                  type: string
                  description: Request endpoint path. Required for HMAC signing.
                  example: "/api/v4/aml/checks/result"
                nonce:
                  type: integer
                  description: Strictly increasing identifier (Unix milliseconds is recommended).
                  example: 1700000000000
              required:
                - id
                - request
                - nonce
      responses:
        '200':
          description: Current state of the screening request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResultResponse'
              examples:
                inProgress:
                  summary: Still processing
                  value:
                    id: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
                    checkedAt: null
                    status: "In progress"
                    riskLevel: null
                    riskDescription: null
                success:
                  summary: Completed — risk evaluated
                  value:
                    id: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
                    checkedAt: 1700000000
                    status: "Success"
                    riskLevel: "low"
                    riskDescription: "The address is verified as secure and suitable for fund transfers."
                failed:
                  summary: Evaluation failed (not charged)
                  value:
                    id: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
                    checkedAt: 1700000000
                    status: "Failed"
                    riskLevel: null
                    riskDescription: null
        '401':
          description: API key lacks the Address Checker permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmlAuthError'
              example:
                code: 4
                message: "This API Key is not authorized to perform this action."
        '404':
          description: The account does not include access to the Address Checker API. Contact Support to request access.
          content:
            application/json:
              schema:
                type: object
              example: {}

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-TXC-APIKEY
      description: The public WhiteBIT API key. The key must include the Address Checker permission.
    PayloadAuth:
      type: apiKey
      in: header
      name: X-TXC-PAYLOAD
      description: Base64-encoded JSON request body.
    SignatureAuth:
      type: apiKey
      in: header
      name: X-TXC-SIGNATURE
      description: HMAC-SHA512 signature of the payload, hex-encoded. Computed as hex(HMAC-SHA512(payload, api_secret)).
  schemas:
    SupportedAsset:
      type: object
      properties:
        asset:
          type: string
          description: Asset symbol supported for screening.
          example: "USDT"
        network:
          type: string
          nullable: true
          description: Network identifier. Returns `null` when not applicable to the asset.
          example: "TRC20"
    CreateCheckResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the created check. Pass the value to the result endpoint.
          example: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
    CreateCheckValidationError:
      type: object
      description: Returned with HTTP 200 when a non-fatal validation error prevents check creation. The account is not charged.
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Map of field name to error messages. Common keys include `balance`.
          example:
            balance:
              - "Insufficient balance"
    CheckResultResponse:
      type: object
      properties:
        id:
          type: string
          description: Check identifier echoed from the request.
          example: "01J9Y3Z7N3KQ5W2X4P6T8B0M9D"
        checkedAt:
          type: integer
          nullable: true
          description: Unix timestamp (seconds) when `status` becomes `Success` or `Failed`. Returns `null` while `status` is `In progress`.
          example: 1700000000
        status:
          type: string
          enum: [In progress, Success, Failed]
          description: |
            Current state of the check.

            - `In progress` — still processing; processing may take up to 3 minutes.
            - `Success` — check completed; `riskLevel` and `riskDescription` are populated.
            - `Failed` — system did not complete the evaluation; the account is not charged. Retry later or contact Support.
          example: "Success"
        riskLevel:
          type: string
          enum: [low, medium, high]
          nullable: true
          description: |
            Risk classification for the screened address. Populated only when `status` is `Success`. Returns `null` when `status` is `In progress` or `Failed`.

            - `low` — the address is verified as secure and suitable for fund transfers.
            - `medium` — the address reflects factors that warrant additional attention; proceed with caution.
            - `high` — the address displays significant risk indicators; the transaction will not be processed. Sending funds from this address is prohibited.
          example: "low"
        riskDescription:
          type: string
          nullable: true
          description: Human-readable risk explanation. Populated only when `status` is `Success`. Returns `null` when `status` is `In progress` or `Failed`.
          example: "The address is verified as secure and suitable for fund transfers."
    AmlAuthError:
      type: object
      properties:
        code:
          type: integer
          description: WhiteBIT internal error code. `4` is `API_KEY_ENDPOINT_RESTRICT`.
          example: 4
        message:
          type: string
          description: Human-readable error message.
          example: "This API Key is not authorized to perform this action."
tags:
  - name: AML
    description: Address Checker endpoints for B2B address screening (AML compliance)
